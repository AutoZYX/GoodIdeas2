<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1a2e1a">
<title>🦕 Lucky's Dino A-Z · 恐龙点名器</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --accent: #ffcb05;
    --accent-2: #ff8a05;
    --green: #5aa840;
  }

  *, *::before, *::after {
    margin: 0; padding: 0; box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    user-select: none;
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    font-family: 'Inter', -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
    color: #f4efdc;
    touch-action: manipulation;
    background: radial-gradient(ellipse at top, #3a5028 0%, #1f2a15 60%, #0f1509 100%);
  }
  body {
    display: flex; flex-direction: column;
    padding: env(safe-area-inset-top, 0) env(safe-area-inset-right, 0)
             env(safe-area-inset-bottom, 0) env(safe-area-inset-left, 0);
  }

  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 18px 4px; font-size: 14px; opacity: 0.85;
  }
  .topbar a { color: inherit; opacity: 0.7; text-decoration: none; }
  .topbar .title {
    font-family: 'Playfair Display', Georgia, serif;
    font-weight: 800; font-size: 17px;
  }
  .letter-chip {
    font-family: 'Playfair Display', Georgia, serif;
    font-weight: 800;
    font-size: 15px;
    color: var(--accent);
    letter-spacing: 0.04em;
  }

  .display {
    flex: 1; min-height: 0; position: relative;
    margin: 6px 10px 4px; border-radius: 18px;
    background:
      radial-gradient(ellipse at 70% 15%, rgba(255,210,120,0.15) 0%, transparent 55%),
      linear-gradient(to bottom,
        rgba(50,78,38,0.65) 0%,
        rgba(32,50,22,0.80) 55%,
        rgba(86,62,38,0.92) 82%,
        rgba(40,26,12,1) 100%);
    border: 1px solid rgba(255,255,255,0.10);
    overflow: hidden;
    display: flex; flex-direction: column;
    box-shadow: inset 0 2px 0 rgba(255,255,255,0.04);
  }
  /* Subtle distant hills */
  .display::before {
    content: '';
    position: absolute;
    left: 0; right: 0;
    bottom: 18%;
    height: 34px;
    background:
      radial-gradient(ellipse 140px 26px at 15% 100%, rgba(0,0,0,0.30) 0%, transparent 70%),
      radial-gradient(ellipse 200px 32px at 45% 100%, rgba(0,0,0,0.38) 0%, transparent 70%),
      radial-gradient(ellipse 160px 28px at 80% 100%, rgba(0,0,0,0.32) 0%, transparent 70%);
    pointer-events: none;
  }

  /* Ground belt with soil texture */
  .ground { position: absolute; bottom: 0; left: 0; right: 0; height: 18%;
    background: linear-gradient(to bottom, #6a4a28 0%, #2e1f10 100%);
    border-top: 2px solid rgba(255,255,255,0.12);
    box-shadow: inset 0 3px 0 rgba(0,0,0,0.20);
  }
  .ground::after {
    content: '';
    position: absolute;
    top: 30%;
    left: 0; right: 0;
    height: 5px;
    background:
      radial-gradient(ellipse 22px 2px at 8% 50%, rgba(255,255,255,0.12), transparent),
      radial-gradient(ellipse 30px 3px at 28% 50%, rgba(0,0,0,0.35), transparent),
      radial-gradient(ellipse 18px 2px at 48% 50%, rgba(255,255,255,0.10), transparent),
      radial-gradient(ellipse 26px 3px at 68% 50%, rgba(0,0,0,0.30), transparent),
      radial-gradient(ellipse 20px 2px at 88% 50%, rgba(255,255,255,0.10), transparent);
    opacity: 0.6;
  }

  .sky-glow { position: absolute; top: 8%; right: 10%; width: 72px; height: 72px;
    border-radius: 50%;
    background: radial-gradient(circle, #ffd78a 0%, #ffa040 60%, transparent 85%);
    opacity: 0.75; filter: blur(4px);
    z-index: 1;
  }
  .flora { position: absolute; bottom: 14%; pointer-events: none; opacity: 0.60; z-index: 1; }
  .flora.left  { left:  3%;  font-size: 48px; }
  .flora.right { right: 3%;  font-size: 40px; }

  /* Name plate (top) */
  .name-plate {
    text-align: center;
    padding: 16px 14px 6px;
    width: 100%; z-index: 5;
    flex-shrink: 0;
  }

  /* Dino stage fills middle/lower area; dino anchors feet on ground */
  .dino-stage {
    flex: 1;
    min-height: 0;
    position: relative;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    padding: 0 14% 14%;   /* bottom padding ≈ ground height, so feet touch ground top */
    z-index: 2;
  }
  .dino {
    width: 100%;
    max-width: 640px;
    height: auto;
    max-height: 100%;
    display: none;
    filter: drop-shadow(0 14px 14px rgba(0,0,0,0.55));
  }
  .dino.active { display: block; animation: dinoAppear .5s cubic-bezier(.34,1.56,.50,1); }
  .dino.roaring { animation: dinoRoar .55s ease-in-out; }
  @keyframes dinoAppear {
    0%   { opacity: 0; transform: translateX(-20px) scale(.92); }
    100% { opacity: 1; transform: translateX(0) scale(1); }
  }
  @keyframes dinoRoar {
    0%, 100% { transform: scale(1); }
    28%      { transform: scale(1.06) rotate(-1.2deg); }
    60%      { transform: scale(1.04) rotate(1.5deg); }
  }
  .letter-badge {
    display: inline-block;
    font-family: 'Playfair Display', Georgia, serif;
    font-weight: 800; font-size: 20px;
    color: #1a1a1a;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    width: 38px; height: 38px; line-height: 38px;
    border-radius: 50%;
    margin-right: 10px;
    vertical-align: middle;
    box-shadow: 0 4px 12px rgba(255,138,5,0.35);
  }
  .name-cn {
    font-family: 'Playfair Display', Georgia, "Noto Serif SC", serif;
    font-size: clamp(22px, 6vw, 30px); font-weight: 800;
    letter-spacing: 0.04em;
    background: linear-gradient(90deg, #ffd670, #ff9a3a);
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent;
    line-height: 1.15;
    display: inline-block; vertical-align: middle;
  }
  .name-en {
    font-family: 'Inter', sans-serif;
    font-size: clamp(12px, 3.2vw, 15px);
    font-style: italic; font-weight: 500;
    opacity: 0.78; margin-top: 4px;
    letter-spacing: 0.03em;
  }
  .name-facts {
    display: flex; justify-content: center; gap: 8px;
    margin-top: 6px; flex-wrap: wrap;
  }
  .fact-chip {
    font-size: 11px; font-weight: 600;
    padding: 3px 10px; border-radius: 999px;
    background: rgba(255,255,255,0.10);
    border: 1px solid rgba(255,255,255,0.15);
    letter-spacing: 0.04em;
  }

  /* Roar button now lives outside the display, between display and picker */
  .roar-wrap {
    display: flex;
    justify-content: center;
    padding: 6px 16px 4px;
    z-index: 4;
  }
  .roar-btn {
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    color: #1a1a1a; border: none;
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 15px; font-weight: 800;
    padding: 11px 26px; border-radius: 999px;
    cursor: pointer;
    box-shadow: 0 8px 24px rgba(255, 138, 5, 0.4);
    letter-spacing: 0.08em;
    transition: transform .12s;
    white-space: nowrap;
  }
  .roar-btn:active { transform: scale(.94); }
  .roar-btn.pulse { animation: roarPulse .7s ease-out; }
  @keyframes roarPulse {
    0%   { box-shadow: 0 0 0 0 rgba(255,138,5,0.7); }
    100% { box-shadow: 0 0 0 30px rgba(255,138,5,0); }
  }
  .roar-btn.speaking {
    background: linear-gradient(135deg, var(--green), #2f7a22);
    color: #fff;
  }

  .nav-arrow {
    position: absolute; top: 45%; transform: translateY(-50%);
    width: 42px; height: 42px; border-radius: 50%;
    background: rgba(0,0,0,0.35);
    border: 1px solid rgba(255,255,255,0.2);
    cursor: pointer; color: #fff;
    font-size: 22px; font-family: inherit;
    z-index: 5;
    backdrop-filter: blur(6px);
    transition: transform .12s, background .12s;
  }
  .nav-arrow:active { transform: translateY(-50%) scale(.9); }
  .nav-arrow.prev { left: 10px; }
  .nav-arrow.next { right: 10px; }

  /* Picker: 26 letter cards */
  .picker {
    display: flex; gap: 6px;
    padding: 6px 10px 12px;
    overflow-x: auto;
    scroll-snap-type: x mandatory;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .picker::-webkit-scrollbar { display: none; }
  .pick-card {
    flex-shrink: 0;
    width: 68px; height: 78px;
    border-radius: 12px;
    background: rgba(255,255,255,0.06);
    border: 2.5px solid transparent;
    cursor: pointer;
    display: flex; flex-direction: column;
    align-items: center; justify-content: space-between;
    gap: 1px; padding: 4px 4px 5px;
    transition: transform .15s, background .15s, border-color .15s;
    scroll-snap-align: center;
    position: relative;
  }
  .pick-card:active { transform: scale(.92); }
  .pick-card.selected {
    border-color: var(--accent);
    background: rgba(255,203,5,0.18);
    box-shadow: 0 0 14px rgba(255,203,5,0.3);
  }
  .pick-card .pick-letter {
    font-family: 'Playfair Display', Georgia, serif;
    font-weight: 800; font-size: 14px;
    color: var(--accent);
    line-height: 1;
  }
  .pick-card .thumb { width: 46px; height: 30px; display: block; }
  .pick-card .thumb-name {
    font-size: 9px; font-weight: 600;
    line-height: 1; letter-spacing: 0.01em;
  }

  @media (max-width: 380px) {
    .pick-card { width: 60px; height: 70px; }
    .pick-card .thumb { width: 40px; height: 26px; }
    .pick-card .thumb-name { font-size: 9px; }
    .roar-btn { font-size: 13px; padding: 10px 18px; }
  }
  @media (max-height: 640px) {
    .name-facts { display: none; }
    .flora { font-size: 36px !important; bottom: 16%; }
    .sky-glow { width: 56px; height: 56px; top: 6%; }
    .dino-stage { height: 54%; }
    .picker { padding: 4px 8px 8px; }
  }
</style>
</head>
<body>

<div class="topbar">
  <a href="./">← Playground</a>
  <div class="title">🦕 恐龙点名器</div>
  <div class="letter-chip">A–Z · 26</div>
</div>

<div class="display">
  <div class="sky-glow"></div>
  <div class="flora left">🌿</div>
  <div class="flora right">🌴</div>

  <div class="name-plate">
    <div>
      <span class="letter-badge" id="letterBadge">A</span>
      <span class="name-cn" id="nameCn">—</span>
    </div>
    <div class="name-en" id="nameEn">—</div>
    <div class="name-facts" id="nameFacts"></div>
  </div>

  <div class="dino-stage" id="dinoStage"></div>

  <div class="ground"></div>

  <button class="nav-arrow prev" id="prevBtn" aria-label="Previous">‹</button>
  <button class="nav-arrow next" id="nextBtn" aria-label="Next">›</button>
</div>

<div class="roar-wrap">
  <button class="roar-btn" id="roarBtn">🔊 点名 · ROLL CALL</button>
</div>

<div class="picker" id="picker"></div>

<script>
(function () {
  'use strict';

  // ---------- SVG helpers ----------
  const grad = (id, c1, c2) =>
    `<defs><linearGradient id="${id}" x1="0" x2="0" y1="0" y2="1">
       <stop offset="0" stop-color="${c1}"/>

  // Simple thumb placeholder for letter card (inline SVG built per dino)
  const thumbBox = (innerSvg, fill='#5a6a30') =>
    `<svg viewBox="0 0 100 60" xmlns="http://www.w3.org/2000/svg">${innerSvg}</svg>`;

  // =========================================================================

  const DINOS = [

    // A — Ankylosaurus
    { letter: 'A', id: 'ankylosaurus', cn: '甲龙', en: 'Ankylosaurus',

          <ellipse cx="210" cy="245" rx="18" ry="9"/><ellipse cx="258" cy="242" rx="18" ry="9"/>
          <ellipse cx="310" cy="240" rx="18" ry="9"/><ellipse cx="362" cy="240" rx="18" ry="9"/>
          <ellipse cx="415" cy="242" rx="18" ry="9"/><ellipse cx="468" cy="245" rx="18" ry="9"/>
          <ellipse cx="520" cy="252" rx="15" ry="8"/><ellipse cx="565" cy="260" rx="12" ry="7"/>

      </svg>`,
      thumb: thumbBox(`<ellipse cx="50" cy="32" rx="35" ry="14" fill="#4a3c26"/>
        <circle cx="30" cy="30" r="3" fill="#6a5a3a"/><circle cx="42" cy="28" r="3" fill="#6a5a3a"/>

        <circle cx="92" cy="42" r="6" fill="#6a5a3a"/><path d="M 80 38 L 90 40 L 88 46 Z" fill="#4a3c26"/>
        <circle cx="14" cy="38" r="0.8" fill="#000"/>`)
    },

    // B — Brachiosaurus (OpenMoji sauropod, CC BY-SA 4.0)
    { letter: 'B', id: 'brachiosaurus', cn: '腕龙', en: 'Brachiosaurus',
      era: '侏罗纪', diet: '植食', size: '26m',
      big: `<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
        <image href="assets/dinos/sauropod.svg" x="100" y="0" width="600" height="500"
               preserveAspectRatio="xMidYMax meet"/>
      </svg>`,
      thumb: thumbBox(`<ellipse cx="55" cy="42" rx="32" ry="11" fill="#4e6884"/>
        <path d="M 36 42 Q 26 22 24 8 Q 24 3 30 3 Q 38 5 39 14 Q 40 30 41 42 Z" fill="#4e6884"/>
        <circle cx="26" cy="8" r="1" fill="#000"/>
        <rect x="35" y="50" width="5" height="9" fill="#4e6884"/>
        <rect x="70" y="50" width="5" height="9" fill="#355070"/>`)
    },

    // C — Carnotaurus (bull-horned predator)
    { letter: 'C', id: 'carnotaurus', cn: '食肉牛龙', en: 'Carnotaurus',
      era: '白垩纪', diet: '肉食', size: '8m',
      big: `<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
        ${grad('cSk','#8a4432','#4a1f10')}

      thumb: thumbBox(`<path d="M 12 32 Q 8 28 12 24 Q 20 20 30 24 L 34 30 Q 28 32 18 32 Z" fill="#7a3a28"/>
        <ellipse cx="60" cy="30" rx="28" ry="8" fill="#7a3a28"/>
        <path d="M 84 28 Q 94 26 96 30 Q 92 34 84 32 Z" fill="#7a3a28"/>

    // D — Diplodocus (very long body + whip tail)
    { letter: 'D', id: 'diplodocus', cn: '梁龙', en: 'Diplodocus',
      era: '侏罗纪', diet: '植食', size: '27m',
      big: `<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">

              fill="url(#dSk)" stroke="#1f1408" stroke-width="3"/>
        <circle cx="45" cy="196" r="3" fill="#1a1a0a"/>
        <ellipse cx="25" cy="200" rx="2" ry="1.2" fill="#0a0810"/>
        <!-- WHIP tail (iconic - extends off right) -->
        <path d="M 665 275 Q 740 278 780 290 Q 790 295 785 300 Q 760 305 720 303 Q 690 298 665 292 Z"
              fill="url(#dSk)" stroke="#1f1408" stroke-width="3"/>
        <path d="M 715 302 Q 760 308 795 320" stroke="#4a321e" stroke-width="3" fill="none" stroke-linecap="round"/>
        <path d="M 290 315 L 288 380 L 328 380 L 332 315 Z" fill="url(#dSk)" stroke="#1f1408" stroke-width="2.5"/>

      thumb: thumbBox(`<ellipse cx="55" cy="36" rx="28" ry="7" fill="#5a4028"/>

    // E — Edmontosaurus (duck-billed hadrosaur)
    { letter: 'E', id: 'edmontosaurus', cn: '埃德蒙顿龙', en: 'Edmontosaurus',
      era: '白垩纪', diet: '植食', size: '12m',
      big: `<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
        ${grad('eSk','#5a7248','#2f4224')}
        <path d="M 410 275 L 405 370 L 445 370 L 452 275 Z" fill="#2a3a1a"/>
        <path d="M 80 210 Q 55 218 55 245 Q 60 278 105 288 Q 180 302 320 305 Q 470 305 580 290 Q 660 278 680 245 Q 650 220 580 215 Q 430 203 290 205 Q 175 210 80 210 Z"

  // =========================================================================
  // VOICE (TTS via Web Speech API) + short roar accent
  // =========================================================================
  let audioCtx = null;
  function ensureCtx() {
    if (!audioCtx) {
      const AC = window.AudioContext || window.webkitAudioContext;
      audioCtx = new AC();
    }
    if (audioCtx.state === 'suspended') audioCtx.resume();
    return audioCtx;
  }

  // Warm the voice list and cache picks (iOS Safari lazy-loads voices)
  let voiceCache = { zh: null, en: null, loaded: false };

  function waitForVoices() {
    return new Promise(resolve => {
      if (!('speechSynthesis' in window)) { resolve([]); return; }
      const tryLoad = () => {
        const list = speechSynthesis.getVoices();
        if (list && list.length) { resolve(list); return true; }
        return false;
      };
      if (tryLoad()) return;
      speechSynthesis.addEventListener('voiceschanged', () => tryLoad(), { once: true });
      // Safari fallback: poll briefly
      let tries = 0;
      const poll = setInterval(() => {
        if (tryLoad() || ++tries > 20) clearInterval(poll);
      }, 120);
    });
  }

  // Score voices so we reliably pick the most natural one available.
  // Heavy bonus for platform "premium/enhanced/neural" voices (iOS 17+, macOS Sonoma+,
  // Chrome Google voices, Edge Microsoft Neural). Penalise eSpeak and legacy voices.
  const CN_PREF = [
    'meijia',      // macOS/iOS Taiwan – very natural
    'tingting',    // macOS/iOS Mainland classic
    'ting-ting',
    'sinji',       // HK Cantonese but good
    'li-mu',       // iOS 17 new neural
    'yue',         // iOS Cantonese
    'xiaoxiao',    // MS Azure neural
    'yaoyao',      // MS classic
    'huihui',      // MS
    'google 普通话',
    'google mandarin',
    'zh-cn-standard'
  ];
  const EN_PREF = [
    'samantha',    // macOS/iOS – US, very natural
    'siri',        // iOS 16+ has Siri voices
    'alex',        // macOS – male, excellent
    'ava',         // iOS premium
    'karen',       // Australian – natural
    'daniel',      // UK – natural
    'moira',       // Irish – natural
    'tessa',       // South African
    'aria',        // MS neural US
    'jenny',       // MS neural US
    'guy',         // MS neural US
    'google us english',
    'google uk english'
  ];

  function scoreVoice(voice, langPrefix) {
    const name = (voice.name || '').toLowerCase();
    const vLang = (voice.lang || '').toLowerCase();
    if (!vLang.startsWith(langPrefix)) return -1;

    let score = 10;
    const prefList = langPrefix === 'zh' ? CN_PREF : EN_PREF;
    for (let i = 0; i < prefList.length; i++) {
      if (name.includes(prefList[i])) { score += 1000 - i * 20; break; }
    }

    // iOS/macOS expose "premium" / "enhanced" flavours — strongly prefer them
    if (/premium|enhanced|neural|natural/.test(name)) score += 400;
    if (/compact|espeak|microsoft david|microsoft zira/i.test(voice.name)) score -= 300;

    // Local voices are usually smoother than remote/compact
    if (voice.localService) score += 50;

    // Prefer richer region tag match (zh-CN over zh)
    if (vLang === (langPrefix === 'zh' ? 'zh-cn' : 'en-us')) score += 30;

    return score;
  }

  async function primeVoices() {
    const voices = await waitForVoices();
    if (!voices.length) { voiceCache.loaded = true; return; }

    let bestCn = null, bestCnScore = -1;
    let bestEn = null, bestEnScore = -1;
    voices.forEach(v => {
      const s = scoreVoice(v, 'zh');
      if (s > bestCnScore) { bestCn = v; bestCnScore = s; }
      const s2 = scoreVoice(v, 'en');
      if (s2 > bestEnScore) { bestEn = v; bestEnScore = s2; }
    });
    voiceCache = { zh: bestCn, en: bestEn, loaded: true };
  }
  primeVoices();

  // Re-check on voices changing (Chrome sometimes adds voices after first speak)
  if ('speechSynthesis' in window) {
    speechSynthesis.addEventListener('voiceschanged', primeVoices);
  }

  function announceDino(dino) {
    if (!('speechSynthesis' in window)) { playChime(); return; }
    speechSynthesis.cancel();

    // Brief pre-roar to catch attention and unlock audio on iOS
    playShortRoar();

    // Ensure voices are loaded before speaking
    const go = () => {
      const cn = new SpeechSynthesisUtterance('我是 ' + dino.cn);
      cn.lang = 'zh-CN';
      cn.rate = 0.85;   // slower for clarity, especially for kids
      cn.pitch = 1.05;  // slightly brighter / friendlier
      cn.volume = 1.0;
      if (voiceCache.zh) cn.voice = voiceCache.zh;

      const en = new SpeechSynthesisUtterance("I am " + dino.en + ".");
      en.lang = 'en-US';
      en.rate = 0.82;   // English needs a touch slower to stay articulate
      en.pitch = 1.02;
      en.volume = 1.0;
      if (voiceCache.en) en.voice = voiceCache.en;

      cn.onend = () => setTimeout(() => speechSynthesis.speak(en), 220);
      en.onend = () => { roarBtn.classList.remove('speaking'); };
      en.onerror = () => { roarBtn.classList.remove('speaking'); };

      roarBtn.classList.add('speaking');
      // Tiny pre-delay so Safari/iOS has time to route audio after gesture
      setTimeout(() => speechSynthesis.speak(cn), 250);
    };

    if (voiceCache.loaded) {
      setTimeout(go, 300);
    } else {
      primeVoices().then(() => setTimeout(go, 300));
    }
  }

  function playShortRoar() {
    try {
      ensureCtx();
      const now = audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      osc.type = 'sawtooth';
      const g = audioCtx.createGain();
      const f = audioCtx.createBiquadFilter();
      f.type = 'lowpass'; f.frequency.value = 1000;
      osc.frequency.setValueAtTime(80, now);
      osc.frequency.linearRampToValueAtTime(220, now + 0.12);
      osc.frequency.exponentialRampToValueAtTime(60, now + 0.4);
      g.gain.setValueAtTime(0, now);
      g.gain.linearRampToValueAtTime(0.25, now + 0.03);
      g.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
      osc.connect(f).connect(g).connect(audioCtx.destination);
      osc.start(now); osc.stop(now + 0.42);
    } catch (e) {}
  }

  function playChime() {
    try {
      ensureCtx();
      const now = audioCtx.currentTime;
      [523, 659, 784].forEach((freq, i) => {
        const osc = audioCtx.createOscillator();
        osc.type = 'sine'; osc.frequency.value = freq;
        const g = audioCtx.createGain();
        const start = now + i*0.08;
        g.gain.setValueAtTime(0, start);
        g.gain.linearRampToValueAtTime(0.2, start + 0.02);
        g.gain.exponentialRampToValueAtTime(0.001, start + 0.4);
        osc.connect(g).connect(audioCtx.destination);
        osc.start(start); osc.stop(start + 0.42);
      });
    } catch (e) {}
  }

  // =========================================================================
  // UI
  // =========================================================================
  const picker      = document.getElementById('picker');
  const dinoStage   = document.getElementById('dinoStage');
  const letterBadge = document.getElementById('letterBadge');
  const nameCn      = document.getElementById('nameCn');
  const nameEn      = document.getElementById('nameEn');
  const nameFacts   = document.getElementById('nameFacts');
  const roarBtn     = document.getElementById('roarBtn');
  const prevBtn     = document.getElementById('prevBtn');
  const nextBtn     = document.getElementById('nextBtn');

  let currentIdx = 0;

  DINOS.forEach((d, i) => {
    const wrap = document.createElement('div');
    wrap.className = 'dino';
    wrap.id = 'dino-' + d.id;
    wrap.innerHTML = d.big;
    dinoStage.appendChild(wrap);

    const card = document.createElement('button');
    card.className = 'pick-card' + (i === 0 ? ' selected' : '');
    card.dataset.idx = i;
    card.setAttribute('aria-label', d.cn + ' ' + d.en);
    card.innerHTML =
      `<div class="pick-letter">${d.letter}</div>` +
      `<div class="thumb">${d.thumb}</div>` +
      `<div class="thumb-name">${d.cn}</div>`;
    card.addEventListener('click', () => showDino(i, true));
    picker.appendChild(card);
  });

  function showDino(idx, autoPlay = false) {
    currentIdx = (idx + DINOS.length) % DINOS.length;
    const d = DINOS[currentIdx];

    document.querySelectorAll('.dino').forEach(el => el.classList.remove('active', 'roaring'));
    const el = document.getElementById('dino-' + d.id);
    el.classList.add('active');

    letterBadge.textContent = d.letter;
    nameCn.textContent = d.cn;
    nameEn.textContent = d.en;
    nameFacts.innerHTML =
      `<span class="fact-chip">🌋 ${d.era}</span>` +
      `<span class="fact-chip">🍖 ${d.diet}</span>` +
      `<span class="fact-chip">📏 ${d.size}</span>`;

    document.querySelectorAll('.pick-card').forEach((c, i) => {
      c.classList.toggle('selected', i === currentIdx);
      if (i === currentIdx) c.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
    });

    if (autoPlay) playAnnouncement();
  }

  function playAnnouncement() {
    const d = DINOS[currentIdx];
    const el = document.getElementById('dino-' + d.id);
    el.classList.remove('roaring');
    void el.offsetWidth;
    el.classList.add('roaring');
    roarBtn.classList.remove('pulse');
    void roarBtn.offsetWidth;
    roarBtn.classList.add('pulse');
    announceDino(d);
    if (navigator.vibrate) navigator.vibrate([30, 40, 60]);
  }

  dinoStage.addEventListener('click', playAnnouncement);
  roarBtn.addEventListener('click', playAnnouncement);
  prevBtn.addEventListener('click', () => showDino(currentIdx - 1, true));
  nextBtn.addEventListener('click', () => showDino(currentIdx + 1, true));

  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowLeft')      showDino(currentIdx - 1, true);
    else if (e.key === 'ArrowRight') showDino(currentIdx + 1, true);
    else if (e.key === ' ' || e.key === 'Enter') { playAnnouncement(); e.preventDefault(); }
  });

  let lastTouch = 0;
  document.addEventListener('touchend', e => {
    const now = Date.now();
    if (now - lastTouch < 320) e.preventDefault();
    lastTouch = now;
  }, { passive: false });

  showDino(0);
})();
