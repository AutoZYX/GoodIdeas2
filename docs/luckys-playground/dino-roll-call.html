<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1a2e1a">
<title>🦕 Lucky's Dino Roll Call · 恐龙点名器</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --accent: #ffcb05;
    --accent-2: #ff8a05;
    --earth: #4a6b3a;
    --fern: #2f4628;
    --sand: #d4b078;
    --rock: #6a5a4a;
  }

  *, *::before, *::after {
    margin: 0; padding: 0; box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    user-select: none;
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    font-family: 'Inter', -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
    color: #f4efdc;
    touch-action: manipulation;
    background:
      radial-gradient(ellipse at top, #3a5028 0%, #1f2a15 60%, #0f1509 100%);
  }
  body {
    display: flex;
    flex-direction: column;
    padding: env(safe-area-inset-top, 0) env(safe-area-inset-right, 0)
             env(safe-area-inset-bottom, 0) env(safe-area-inset-left, 0);
  }

  /* ====== Top bar ====== */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 18px 6px;
    font-size: 14px;
    opacity: 0.85;
  }
  .topbar a { color: inherit; opacity: 0.7; text-decoration: none; }
  .topbar a:hover { opacity: 1; }
  .topbar .title {
    font-family: 'Playfair Display', Georgia, serif;
    font-weight: 800;
    font-size: 18px;
  }

  /* ====== Main display ====== */
  .display {
    flex: 1;
    min-height: 0;
    position: relative;
    margin: 8px 10px 4px;
    border-radius: 18px;
    background:
      linear-gradient(to bottom,
        rgba(45, 70, 35, 0.6) 0%,
        rgba(30, 45, 20, 0.7) 55%,
        rgba(90, 70, 45, 0.85) 100%);
    border: 1px solid rgba(255,255,255,0.10);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  /* Ground / soil layer */
  .ground {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 20%;
    background: linear-gradient(to bottom, #5a4028 0%, #2a1e10 100%);
    border-top: 2px solid rgba(255,255,255,0.1);
  }
  .ground::before {
    content: '';
    position: absolute;
    top: 12%;
    left: 0; right: 0;
    height: 8px;
    background: radial-gradient(ellipse 24px 3px at 10% 50%, #7a5a38 0%, transparent 100%),
                radial-gradient(ellipse 20px 3px at 30% 50%, #8a6a48 0%, transparent 100%),
                radial-gradient(ellipse 30px 4px at 55% 50%, #7a5a38 0%, transparent 100%),
                radial-gradient(ellipse 26px 3px at 75% 50%, #8a6a48 0%, transparent 100%),
                radial-gradient(ellipse 22px 3px at 92% 50%, #7a5a38 0%, transparent 100%);
    opacity: 0.6;
  }

  /* Sun / moon / prehistoric sky glow */
  .sky-glow {
    position: absolute;
    top: 10%;
    right: 12%;
    width: 80px; height: 80px;
    border-radius: 50%;
    background: radial-gradient(circle, #ffd78a 0%, #ffa040 60%, transparent 85%);
    opacity: 0.8;
    filter: blur(4px);
  }

  /* Silhouette ferns / trees */
  .flora {
    position: absolute;
    bottom: 16%;
    pointer-events: none;
    opacity: 0.6;
    z-index: 1;
  }
  .flora.left  { left:  2%;  font-size: 60px; }
  .flora.right { right: 2%;  font-size: 48px; }

  /* Dinosaur stage */
  .dino-stage {
    width: 94%;
    max-width: 720px;
    height: 62%;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    z-index: 2;
    margin-bottom: 4%;
  }
  .dino {
    width: 100%;
    height: 100%;
    display: none;
    filter: drop-shadow(0 12px 18px rgba(0,0,0,0.55));
  }
  .dino.active { display: block; animation: dinoAppear .5s cubic-bezier(.34,1.56,.50,1); }
  .dino.roaring { animation: dinoRoar .5s ease-in-out; }
  @keyframes dinoAppear {
    0%   { opacity: 0; transform: translateX(-20px) scale(.95); }
    100% { opacity: 1; transform: translateX(0) scale(1); }
  }
  @keyframes dinoRoar {
    0%, 100% { transform: scale(1); }
    30%      { transform: scale(1.05) rotate(-1deg); }
    60%      { transform: scale(1.04) rotate(1.5deg); }
  }

  /* Name plate */
  .name-plate {
    text-align: center;
    padding: 4px 12px 8px;
    width: 100%;
    z-index: 3;
  }
  .name-cn {
    font-family: 'Playfair Display', Georgia, "Noto Serif SC", serif;
    font-size: clamp(22px, 6vw, 32px);
    font-weight: 800;
    letter-spacing: 0.04em;
    background: linear-gradient(90deg, #ffd670, #ff9a3a);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    line-height: 1.15;
  }
  .name-en {
    font-family: 'Inter', sans-serif;
    font-size: clamp(12px, 3.2vw, 15px);
    font-style: italic;
    font-weight: 500;
    opacity: 0.75;
    margin-top: 2px;
    letter-spacing: 0.03em;
  }
  .name-facts {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-top: 6px;
    flex-wrap: wrap;
  }
  .fact-chip {
    font-size: 11px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 999px;
    background: rgba(255,255,255,0.10);
    border: 1px solid rgba(255,255,255,0.15);
    letter-spacing: 0.04em;
  }

  /* Roar button */
  .roar-wrap {
    position: absolute;
    bottom: 4%;
    left: 50%;
    transform: translateX(-50%);
    z-index: 4;
  }
  .roar-btn {
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    color: #1a1a1a;
    border: none;
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 16px;
    font-weight: 800;
    padding: 12px 26px;
    border-radius: 999px;
    cursor: pointer;
    box-shadow: 0 8px 24px rgba(255, 138, 5, 0.4);
    letter-spacing: 0.1em;
    transition: transform .12s, box-shadow .12s;
  }
  .roar-btn:active { transform: scale(.94); }
  .roar-btn.pulse { animation: roarPulse .7s ease-out; }
  @keyframes roarPulse {
    0%   { box-shadow: 0 0 0 0 rgba(255,138,5,0.7); }
    100% { box-shadow: 0 0 0 30px rgba(255,138,5,0); }
  }

  /* Prev/Next arrows */
  .nav-arrow {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 44px; height: 44px;
    border-radius: 50%;
    background: rgba(0,0,0,0.3);
    border: 1px solid rgba(255,255,255,0.2);
    cursor: pointer;
    color: #fff;
    font-size: 22px;
    font-family: inherit;
    z-index: 5;
    backdrop-filter: blur(6px);
    transition: transform .12s, background .12s;
  }
  .nav-arrow:active { transform: translateY(-50%) scale(.9); }
  .nav-arrow:hover { background: rgba(0,0,0,0.5); }
  .nav-arrow.prev { left: 10px; }
  .nav-arrow.next { right: 10px; }

  /* Dino picker row (thumbnails) */
  .picker {
    display: flex;
    gap: 8px;
    padding: 6px 10px 14px;
    overflow-x: auto;
    scroll-snap-type: x mandatory;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .picker::-webkit-scrollbar { display: none; }
  .pick-card {
    flex-shrink: 0;
    width: 78px; height: 72px;
    border-radius: 14px;
    background: rgba(255,255,255,0.08);
    border: 3px solid transparent;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
    padding: 4px;
    transition: transform .15s, background .15s, border-color .15s;
    scroll-snap-align: center;
  }
  .pick-card:active { transform: scale(.92); }
  .pick-card.selected {
    border-color: var(--accent);
    background: rgba(255,203,5,0.18);
  }
  .pick-card .thumb {
    width: 52px; height: 38px;
    display: block;
  }
  .pick-card .thumb-name {
    font-size: 10px;
    font-weight: 600;
    line-height: 1;
    letter-spacing: 0.02em;
  }

  @media (max-width: 380px) {
    .pick-card { width: 70px; height: 68px; }
    .pick-card .thumb { width: 46px; height: 34px; }
    .roar-btn { font-size: 14px; padding: 10px 20px; }
  }
  @media (max-height: 640px) {
    .name-facts { display: none; }
    .flora { font-size: 40px !important; bottom: 18%; }
    .sky-glow { width: 60px; height: 60px; top: 6%; }
    .dino-stage { height: 58%; }
    .picker { padding: 4px 8px 10px; }
  }
</style>
</head>
<body>

<div class="topbar">
  <a href="./">← Playground</a>
  <div class="title">🦕 恐龙点名器 · Dino Roll Call</div>
</div>

<!-- ================ DISPLAY STAGE ================ -->
<div class="display">
  <div class="sky-glow"></div>
  <div class="flora left">🌿</div>
  <div class="flora right">🌴</div>
  <div class="ground"></div>

  <button class="nav-arrow prev" id="prevBtn" aria-label="Previous dinosaur">‹</button>
  <button class="nav-arrow next" id="nextBtn" aria-label="Next dinosaur">›</button>

  <div class="dino-stage" id="dinoStage">
    <!-- Dinosaur SVGs injected by JS -->
  </div>

  <div class="name-plate">
    <div class="name-cn" id="nameCn">—</div>
    <div class="name-en" id="nameEn">—</div>
    <div class="name-facts" id="nameFacts"></div>
  </div>

  <div class="roar-wrap">
    <button class="roar-btn" id="roarBtn">🔊 ROAR!</button>
  </div>
</div>

<!-- ================ PICKER ================ -->
<div class="picker" id="picker">
  <!-- Thumbnails injected by JS -->
</div>

<script>
(function () {

  //   drawDino(scale): big SVG innerHTML
  //   drawThumb(): small SVG innerHTML
  //   roar(ctx): function that plays a custom roar
  // =========================================================================

  // Helper: build a gradient def
  function skinGrad(id, c1, c2) {

                 Q 72 218 58 215 Z"
              fill="url(#trexSkin)" stroke="#1c230e" stroke-width="3" stroke-linejoin="round"/>
        <!-- OPEN MOUTH: lower jaw, creates gap -->
        <path d="M 52 215 Q 58 242 95 252 Q 135 258 152 246 L 140 230 Q 105 228 78 222 Q 62 217 52 215 Z"

        <!-- Tiny ICONIC arms -->

        <path d="M 362 382 L 365 394 L 372 382 Z M 380 382 L 383 394 L 390 382 Z M 398 382 L 401 394 L 408 382 Z" fill="#0e1208"/>
        <!-- Body texture stripes -->

          <path d="M 380 205 Q 420 208 450 208"/>

        </g>
      </svg>`,
      thumb: `<svg viewBox="0 0 100 60" xmlns="http://www.w3.org/2000/svg">
        <path d="M 30 30 Q 20 22 12 25 Q 6 28 6 32 Q 7 36 15 37 L 18 42 Q 8 44 6 48 Q 7 51 12 51 Q 22 51 32 46 Q 38 42 38 34 Z" fill="#5a6330"/>

        <circle cx="22" cy="30" r="1.5" fill="#ffd540"/>
      </svg>`,
      roar: (ctx, master) => roarProfile(ctx, master, {
        baseLow: 50, basePeak: 180, dur: 1.6, wave: 'sawtooth',
        filterFreq: 900, vibrato: 9, noiseLevel: 0.25
      })
    },

    // 2. TRICERATOPS

      id: 'triceratops', cn: '三角龙', en: 'Triceratops',
      era: '白垩纪', diet: '植食', size: '9m / 30ft',

        ${skinGrad('triSkin','#967a52','#62492c')}
        ${skinGrad('triFrill','#b04a26','#6e2010')}

        <!-- Small tail -->

              fill="url(#triSkin)" stroke="#2a1f10" stroke-width="2.5"/>
      </svg>`,
      thumb: `<svg viewBox="0 0 100 60" xmlns="http://www.w3.org/2000/svg">
        <path d="M 30 28 Q 20 25 14 30 Q 10 38 16 42 Q 22 44 30 42 L 26 36 Z" fill="#9a3020"/>

    // 3. STEGOSAURUS

      era: '侏罗纪', diet: '植食', size: '9m / 30ft',
      big: `<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">

      })

  // =========================================================================
  // AUDIO: generic roar synth with parametric profile
  // =========================================================================
  let audioCtx = null;
  let master = null;
  function ensureCtx() {
    if (!audioCtx) {
      const AC = window.AudioContext || window.webkitAudioContext;
      audioCtx = new AC();
      master = audioCtx.createGain();
      master.gain.value = 0.4;
      master.connect(audioCtx.destination);
    }
    if (audioCtx.state === 'suspended') audioCtx.resume();
    return audioCtx;
  }

  function roarProfile(ctx, master, p) {
    const now = ctx.currentTime;
    const dur = p.dur;

    // Main oscillator — the roar pitch
    const osc = ctx.createOscillator();
    osc.type = p.wave;
    const filt = ctx.createBiquadFilter();
    filt.type = 'lowpass';
    filt.frequency.value = p.filterFreq;
    filt.Q.value = 4;

    // Envelope
    const g = ctx.createGain();
    g.gain.setValueAtTime(0, now);
    g.gain.linearRampToValueAtTime(0.35, now + 0.05);
    g.gain.setValueAtTime(0.35, now + dur - 0.25);
    g.gain.exponentialRampToValueAtTime(0.001, now + dur);

    // Frequency sweep (roar shape: rises fast, slowly falls)
    osc.frequency.setValueAtTime(p.baseLow, now);
    osc.frequency.linearRampToValueAtTime(p.basePeak, now + dur * 0.2);
    osc.frequency.linearRampToValueAtTime(p.baseLow * 0.8, now + dur);

    // Vibrato (tremor) via LFO on frequency
    if (p.vibrato > 0) {
      const lfo = ctx.createOscillator();
      lfo.frequency.value = p.vibrato;
      const lfoGain = ctx.createGain();
      lfoGain.gain.value = p.basePeak * 0.08;
      lfo.connect(lfoGain).connect(osc.frequency);
      lfo.start(now);
      lfo.stop(now + dur);
    }

    osc.connect(filt).connect(g).connect(master);
    osc.start(now);
    osc.stop(now + dur + 0.02);

    // Noise layer for "growl texture"
    if (p.noiseLevel > 0) {
      const bufSize = Math.floor(ctx.sampleRate * dur);
      const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < bufSize; i++) data[i] = (Math.random() * 2 - 1);
      const noise = ctx.createBufferSource();
      noise.buffer = buf;
      const noiseFilt = ctx.createBiquadFilter();
      noiseFilt.type = 'bandpass';
      noiseFilt.frequency.value = p.filterFreq * 0.7;
      noiseFilt.Q.value = 2;
      const noiseGain = ctx.createGain();
      noiseGain.gain.setValueAtTime(0, now);
      noiseGain.gain.linearRampToValueAtTime(p.noiseLevel, now + 0.05);
      noiseGain.gain.exponentialRampToValueAtTime(0.001, now + dur);
      noise.connect(noiseFilt).connect(noiseGain).connect(master);
      noise.start(now);
      noise.stop(now + dur);
    }

    // Pteranodon screech option: a second high oscillator
    if (p.screech) {
      const scr = ctx.createOscillator();
      scr.type = 'sawtooth';
      scr.frequency.setValueAtTime(1200, now);
      scr.frequency.linearRampToValueAtTime(1800, now + dur * 0.3);
      scr.frequency.linearRampToValueAtTime(900, now + dur);
      const scrG = ctx.createGain();
      scrG.gain.setValueAtTime(0, now);
      scrG.gain.linearRampToValueAtTime(0.12, now + 0.05);
      scrG.gain.exponentialRampToValueAtTime(0.001, now + dur);
      scr.connect(scrG).connect(master);
      scr.start(now); scr.stop(now + dur);
    }
  }

  // =========================================================================
  // UI
  // =========================================================================
  const picker      = document.getElementById('picker');
  const dinoStage   = document.getElementById('dinoStage');
  const nameCn      = document.getElementById('nameCn');
  const nameEn      = document.getElementById('nameEn');
  const nameFacts   = document.getElementById('nameFacts');
  const roarBtn     = document.getElementById('roarBtn');
  const prevBtn     = document.getElementById('prevBtn');
  const nextBtn     = document.getElementById('nextBtn');

  let currentIdx = 0;

  // Populate dinosaur stage (big SVGs, hidden)
  DINOS.forEach((d, i) => {
    const wrap = document.createElement('div');
    wrap.className = 'dino';
    wrap.id = 'dino-' + d.id;
    wrap.innerHTML = d.big;
    dinoStage.appendChild(wrap);

    // Thumb card
    const card = document.createElement('button');
    card.className = 'pick-card' + (i === 0 ? ' selected' : '');
    card.dataset.idx = i;
    card.setAttribute('aria-label', d.cn + ' / ' + d.en);
    card.innerHTML = `<div class="thumb">${d.thumb}</div><div class="thumb-name">${d.cn}</div>`;
    card.addEventListener('click', () => showDino(i));
    picker.appendChild(card);
  });

  function showDino(idx, triggerRoar = false) {
    currentIdx = (idx + DINOS.length) % DINOS.length;
    const d = DINOS[currentIdx];

    // Update stage (remove active from all, add to current)
    document.querySelectorAll('.dino').forEach(el => el.classList.remove('active', 'roaring'));
    const el = document.getElementById('dino-' + d.id);
    el.classList.add('active');

    // Update name + facts
    nameCn.textContent = d.cn;
    nameEn.textContent = d.en;
    nameFacts.innerHTML = `
      <span class="fact-chip">🌋 ${d.era}</span>
      <span class="fact-chip">🍖 ${d.diet}</span>
      <span class="fact-chip">📏 ${d.size}</span>
    `;

    // Update picker selection
    document.querySelectorAll('.pick-card').forEach((c, i) => {
      c.classList.toggle('selected', i === currentIdx);
      if (i === currentIdx) c.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
    });

    if (triggerRoar) playRoar();
  }

  function playRoar() {
    ensureCtx();
    const d = DINOS[currentIdx];
    const el = document.getElementById('dino-' + d.id);
    el.classList.remove('roaring');
    void el.offsetWidth;
    el.classList.add('roaring');
    roarBtn.classList.remove('pulse');
    void roarBtn.offsetWidth;
    roarBtn.classList.add('pulse');
    if (d.roar) d.roar(audioCtx, master);
    if (navigator.vibrate) navigator.vibrate([30, 40, 60]);
  }

  // Auto-roar when tapping the dinosaur itself
  dinoStage.addEventListener('click', () => playRoar());
  roarBtn.addEventListener('click', playRoar);
  prevBtn.addEventListener('click', () => showDino(currentIdx - 1));
  nextBtn.addEventListener('click', () => showDino(currentIdx + 1));

  // Keyboard arrows
  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowLeft') showDino(currentIdx - 1);
    else if (e.key === 'ArrowRight') showDino(currentIdx + 1);
    else if (e.key === ' ' || e.key === 'Enter') { playRoar(); e.preventDefault(); }
  });

  // iOS double-tap zoom prevention
  let lastTouch = 0;
  document.addEventListener('touchend', e => {
    const now = Date.now();
    if (now - lastTouch < 320) e.preventDefault();
    lastTouch = now;
  }, { passive: false });

  // Boot up
  showDino(0);
})();
