<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lucas Future Builder — Lucky's Playground</title>
<style>
  :root {
    --panel: rgba(13, 22, 33, 0.76);
    --panel-solid: #111c29;
    --panel-soft: rgba(255, 255, 255, 0.08);
    --line: rgba(255, 255, 255, 0.18);
    --line-strong: rgba(255, 255, 255, 0.34);
    --text: #f6fbff;
    --muted: rgba(246, 251, 255, 0.72);
    --faint: rgba(246, 251, 255, 0.5);
    --yellow: #ffd45a;
    --orange: #ff8c3a;
    --cyan: #5de7ff;
    --green: #7affb9;
    --danger: #ff6b6b;
    --shadow: 0 18px 60px rgba(0, 0, 0, 0.34);
  }

  * {
    box-sizing: border-box;
  }

  html,
  body {
    background: #07111d;
    min-height: 100%;
    width: 100%;
    overflow-x: hidden;
  }

  body {
    margin: 0;
    color: var(--text);
    font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background:
      radial-gradient(circle at 18% 18%, rgba(93, 231, 255, 0.18), transparent 30%),
      radial-gradient(circle at 82% 8%, rgba(255, 212, 90, 0.14), transparent 28%),
      linear-gradient(135deg, #07111d 0%, #17202c 42%, #09131f 100%);
    background-color: #07111d;
    overflow-x: hidden;
    max-width: 100vw;
  }

  button,
  a {
    font: inherit;
  }

  button {
    cursor: pointer;
  }

  .app {
    min-height: 100vh;
    min-height: 100svh;
    width: 100%;
    max-width: 100vw;
    padding: 14px;
    display: grid;
    grid-template-rows: auto minmax(0, 1fr);
    gap: 12px;
  }

  .topbar {
    max-width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 10px 12px;
    border: 1px solid var(--line);
    border-radius: 16px;
    background: rgba(7, 17, 29, 0.62);
    backdrop-filter: blur(16px);
    box-shadow: 0 10px 28px rgba(0, 0, 0, 0.24);
  }

  .brand {
    min-width: 0;
  }

  .back {
    color: var(--muted);
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 7px;
    font-size: 0.86rem;
    margin-bottom: 2px;
  }

  .back:hover {
    color: var(--cyan);
  }

  h1 {
    margin: 0;
    font-size: clamp(1.35rem, 3vw, 2.45rem);
    line-height: 1.05;
    letter-spacing: 0;
    overflow-wrap: anywhere;
  }

  .top-actions {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .pill-button,
  .icon-button {
    border: 1px solid var(--line);
    color: var(--text);
    background: rgba(255, 255, 255, 0.09);
    border-radius: 999px;
    min-height: 42px;
    padding: 0 14px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.12);
  }

  .icon-button {
    width: 42px;
    padding: 0;
    font-size: 1.15rem;
  }

  .pill-button:hover,
  .icon-button:hover {
    border-color: var(--cyan);
    background: rgba(93, 231, 255, 0.15);
  }

  .shell {
    min-height: 0;
    min-width: 0;
    display: grid;
    grid-template-columns: minmax(0, 1fr) clamp(270px, 23vw, 350px);
    gap: 12px;
    align-items: stretch;
  }

  .stage-shell {
    min-width: 0;
    position: relative;
  }

  .stage {
    position: relative;
    max-width: 100%;
    min-height: 570px;
    height: calc(100svh - 110px);
    border-radius: 18px;
    overflow: hidden;
    border: 1px solid var(--line-strong);
    box-shadow: var(--shadow);
    background-size: cover;
    background-position: center;
    isolation: isolate;
  }

  .stage::before {
    content: "";
    position: absolute;
    inset: 0;
    background:
      linear-gradient(90deg, rgba(3, 9, 16, 0.68), rgba(3, 9, 16, 0.18) 46%, rgba(3, 9, 16, 0.58)),
      linear-gradient(180deg, rgba(2, 7, 13, 0.34), transparent 38%, rgba(2, 7, 13, 0.66));
    z-index: 0;
  }

  .stage-grid {
    position: absolute;
    inset: 0;
    z-index: 1;
    background-image:
      linear-gradient(rgba(93, 231, 255, 0.12) 1px, transparent 1px),
      linear-gradient(90deg, rgba(93, 231, 255, 0.12) 1px, transparent 1px);
    background-size: 44px 44px;
    mask-image: linear-gradient(180deg, transparent 0%, black 24%, black 86%, transparent 100%);
    opacity: 0.32;
    pointer-events: none;
  }

  .mission-tabs {
    position: absolute;
    z-index: 8;
    top: 12px;
    left: 12px;
    right: 12px;
    display: flex;
    gap: 8px;
    overflow-x: auto;
    scrollbar-width: none;
    padding-bottom: 4px;
  }

  .mission-tabs::-webkit-scrollbar {
    display: none;
  }

  .mission-tab {
    flex: 0 0 auto;
    min-height: 40px;
    border-radius: 999px;
    border: 1px solid var(--line);
    color: var(--muted);
    background: rgba(8, 16, 27, 0.72);
    padding: 0 13px;
    display: inline-flex;
    align-items: center;
    gap: 7px;
    backdrop-filter: blur(14px);
  }

  .mission-tab.done {
    border-color: rgba(122, 255, 185, 0.56);
    color: var(--green);
  }

  .mission-tab.active {
    color: #07111d;
    border-color: rgba(255, 212, 90, 0.95);
    background: linear-gradient(135deg, #ffe36c, #ff9c42);
    box-shadow: 0 12px 28px rgba(255, 140, 58, 0.22);
  }

  .scene-copy {
    position: absolute;
    z-index: 6;
    top: 68px;
    left: 18px;
    width: min(520px, calc(100% - 36px));
    padding: 16px 18px;
    border: 1px solid rgba(255, 255, 255, 0.16);
    border-radius: 16px;
    background: rgba(4, 10, 17, 0.48);
    backdrop-filter: blur(14px);
  }

  .scene-copy h2 {
    margin: 0 0 6px;
    font-size: clamp(1.25rem, 2.2vw, 2rem);
    line-height: 1.08;
    letter-spacing: 0;
  }

  .scene-copy p {
    margin: 0;
    color: var(--muted);
    font-size: 0.96rem;
    line-height: 1.55;
    overflow-wrap: anywhere;
    white-space: normal;
    word-break: break-all;
  }

  .track {
    position: absolute;
    z-index: 2;
    left: -8%;
    right: -8%;
    bottom: 6%;
    height: 28%;
    transform: perspective(700px) rotateX(53deg);
    transform-origin: bottom center;
    border-top: 4px solid rgba(255, 255, 255, 0.26);
    border-bottom: 8px solid rgba(0, 0, 0, 0.35);
    background:
      repeating-linear-gradient(90deg, transparent 0 74px, rgba(255, 212, 90, 0.86) 74px 126px, transparent 126px 200px),
      linear-gradient(180deg, rgba(20, 31, 41, 0.82), rgba(42, 48, 56, 0.9));
    background-size: 100% 8px, 100% 100%;
    background-position: center 49%, center;
    box-shadow: 0 -18px 38px rgba(0, 0, 0, 0.24);
  }

  .lane-glow {
    position: absolute;
    z-index: 3;
    left: 9%;
    right: 9%;
    bottom: 20%;
    height: 3px;
    background: linear-gradient(90deg, transparent, rgba(93, 231, 255, 0.8), transparent);
    box-shadow: 0 0 20px rgba(93, 231, 255, 0.6);
    opacity: 0.78;
  }

  .prop {
    position: absolute;
    z-index: 5;
    left: calc(var(--x) * 1%);
    top: calc(var(--y) * 1%);
    width: calc(var(--w) * 1%);
    transform: translate(-50%, -50%);
    transition: transform 0.35s ease, opacity 0.35s ease, filter 0.35s ease;
    pointer-events: auto;
    cursor: pointer;
  }

  .prop img {
    width: 100%;
    display: block;
    filter: drop-shadow(0 14px 20px rgba(0, 0, 0, 0.42));
  }

  .prop.done {
    transform: translate(-50%, -50%) scale(0.64) rotate(-9deg);
    opacity: 0.34;
    filter: saturate(0.55);
  }

  .prop.available img {
    filter:
      drop-shadow(0 14px 20px rgba(0, 0, 0, 0.42))
      drop-shadow(0 0 18px rgba(93, 231, 255, 0.34));
  }

  .prop.blocked {
    opacity: 0.56;
    filter: saturate(0.65);
  }

  .prop.focus-target {
    transform: translate(-50%, -50%) scale(1.12);
  }

  .prop.wrong {
    animation: wrongShake 0.36s ease;
  }

  .prop.done.bridge-made {
    transform: translate(-50%, -50%) scale(1.02);
    opacity: 1;
    filter: none;
  }

  .prop-label {
    position: absolute;
    left: 50%;
    bottom: -12px;
    transform: translateX(-50%);
    white-space: nowrap;
    color: var(--text);
    background: rgba(5, 13, 22, 0.74);
    border: 1px solid rgba(255, 255, 255, 0.16);
    border-radius: 999px;
    padding: 4px 8px;
    font-size: 0.72rem;
    line-height: 1;
    box-shadow: 0 8px 18px rgba(0, 0, 0, 0.24);
  }

  .prop-action {
    position: absolute;
    right: -4px;
    top: -8px;
    width: 30px;
    height: 30px;
    border-radius: 10px;
    background: rgba(6, 15, 24, 0.76);
    border: 1px solid rgba(93, 231, 255, 0.36);
    display: grid;
    place-items: center;
    box-shadow: 0 0 18px rgba(93, 231, 255, 0.22);
  }

  .prop-action img {
    width: 22px;
    height: 22px;
    object-fit: contain;
    filter: none;
  }

  @keyframes wrongShake {
    0%, 100% { transform: translate(-50%, -50%) rotate(0deg); }
    25% { transform: translate(calc(-50% - 7px), -50%) rotate(-3deg); }
    55% { transform: translate(calc(-50% + 7px), -50%) rotate(3deg); }
  }

  .vehicle-runner {
    position: absolute;
    z-index: 7;
    left: -26%;
    bottom: 12%;
    width: min(29%, 330px);
    transform: translateX(0) scale(var(--scale, 1));
    transition: left 1.18s cubic-bezier(0.18, 0.8, 0.22, 1), transform 1.18s ease;
    pointer-events: none;
    filter: drop-shadow(0 20px 24px rgba(0, 0, 0, 0.42));
  }

  .vehicle-runner.drive {
    left: calc(var(--target) * 1%);
    transform: translateX(-50%) scale(var(--scale, 1));
  }

  .vehicle-runner.exit {
    left: 118%;
    transform: translateX(0) scale(var(--scale, 1));
  }

  .finish-burst {
    position: absolute;
    z-index: 9;
    left: 50%;
    top: 52%;
    width: 240px;
    height: 240px;
    border-radius: 50%;
    transform: translate(-50%, -50%) scale(0);
    background:
      radial-gradient(circle, rgba(255, 212, 90, 0.9), transparent 34%),
      conic-gradient(from 0deg, rgba(93, 231, 255, 0.8), rgba(122, 255, 185, 0.75), rgba(255, 140, 58, 0.85), rgba(93, 231, 255, 0.8));
    mix-blend-mode: screen;
    pointer-events: none;
    opacity: 0;
  }

  .finish-burst.show {
    animation: burst 0.9s ease-out;
  }

  @keyframes burst {
    0% { opacity: 0; transform: translate(-50%, -50%) scale(0.2) rotate(0deg); }
    35% { opacity: 0.95; transform: translate(-50%, -50%) scale(1) rotate(90deg); }
    100% { opacity: 0; transform: translate(-50%, -50%) scale(1.7) rotate(160deg); }
  }

  .side {
    height: calc(100svh - 110px);
    min-height: 0;
    min-width: 0;
    display: grid;
    grid-template-rows: auto auto minmax(145px, 0.72fr) minmax(210px, 1fr) auto;
    gap: 10px;
    overflow: hidden;
  }

  .panel {
    min-height: 0;
    min-width: 0;
    max-width: 100%;
    border: 1px solid var(--line);
    border-radius: 16px;
    background: var(--panel);
    backdrop-filter: blur(18px);
    box-shadow: 0 14px 38px rgba(0, 0, 0, 0.2);
  }

  .mission-panel {
    padding: 14px;
  }

  .label {
    color: var(--faint);
    font-size: 0.74rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .mission-name {
    margin: 0 0 7px;
    font-size: 1.2rem;
    line-height: 1.2;
  }

  .mission-goal {
    color: var(--muted);
    line-height: 1.45;
    margin: 0;
    font-size: 0.94rem;
  }

  .energy {
    display: flex;
    gap: 6px;
    margin-top: 10px;
  }

  .energy-cell {
    flex: 1;
    height: 9px;
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.14);
  }

  .energy-cell.on {
    background: linear-gradient(90deg, var(--yellow), var(--orange));
    box-shadow: 0 0 14px rgba(255, 140, 58, 0.38);
  }

  .plan-panel {
    padding: 12px;
  }

  .selected-strip {
    display: flex;
    flex-wrap: nowrap;
    gap: 8px;
    min-height: 47px;
    align-items: center;
  }

  .plan-token {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    border: 1px solid rgba(255, 212, 90, 0.45);
    border-radius: 999px;
    background: rgba(255, 212, 90, 0.13);
    color: var(--text);
    padding: 6px 9px 6px 6px;
    max-width: 100%;
  }

  .plan-token img {
    width: 34px;
    height: 30px;
    object-fit: contain;
    filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.34));
  }

  .empty-plan {
    color: var(--faint);
    font-size: 0.88rem;
  }

  .selected-vehicle {
    display: grid;
    grid-template-columns: 72px minmax(0, 1fr);
    gap: 10px;
    align-items: center;
    width: 100%;
    min-width: 0;
  }

  .selected-vehicle img {
    width: 72px;
    height: 50px;
    object-fit: contain;
    filter: drop-shadow(0 10px 12px rgba(0, 0, 0, 0.34));
  }

  .selected-vehicle b {
    display: block;
    font-size: 0.95rem;
    line-height: 1.2;
  }

  .selected-vehicle span {
    display: block;
    color: var(--muted);
    font-size: 0.78rem;
    line-height: 1.3;
    margin-top: 3px;
  }

  .task-panel {
    min-height: 0;
    padding: 12px;
    overflow: auto;
  }

  .tasks {
    display: grid;
    gap: 8px;
  }

  .task-card {
    min-width: 0;
    width: 100%;
    min-height: 58px;
    display: grid;
    grid-template-columns: 38px minmax(0, 1fr) auto;
    gap: 8px;
    align-items: center;
    padding: 7px;
    border: 1px solid var(--line);
    border-radius: 12px;
    color: var(--text);
    background: rgba(255, 255, 255, 0.07);
    text-align: left;
  }

  .task-card img {
    width: 38px;
    height: 38px;
    object-fit: contain;
  }

  .task-card b {
    display: block;
    font-size: 0.86rem;
    line-height: 1.15;
  }

  .task-card span {
    display: block;
    color: var(--muted);
    font-size: 0.72rem;
    line-height: 1.25;
    margin-top: 2px;
  }

  .task-card.done {
    border-color: rgba(122, 255, 185, 0.46);
    background: rgba(122, 255, 185, 0.1);
  }

  .task-card.blocked {
    opacity: 0.58;
  }

  .task-state {
    color: var(--faint);
    font-size: 0.8rem;
  }

  .vehicle-panel {
    min-height: 0;
    min-width: 0;
    padding: 12px;
    overflow: auto;
  }

  .vehicles {
    display: grid;
    gap: 9px;
    min-width: 0;
  }

  .vehicle-card {
    display: grid;
    grid-template-columns: 45% minmax(0, 1fr);
    gap: 8px;
    align-items: center;
    min-height: 88px;
    border: 1px solid var(--line);
    border-radius: 12px;
    color: var(--text);
    background: rgba(255, 255, 255, 0.07);
    padding: 7px;
    min-width: 0;
    text-align: left;
    transition: transform 0.12s ease, border-color 0.12s ease, background 0.12s ease;
  }

  .vehicle-card:hover {
    transform: translateY(-1px);
    border-color: var(--cyan);
    background: rgba(93, 231, 255, 0.12);
  }

  .vehicle-card.selected {
    border-color: var(--yellow);
    background: rgba(255, 212, 90, 0.12);
  }

  .vehicle-card img {
    width: 100%;
    height: 66px;
    object-fit: contain;
    filter: drop-shadow(0 10px 12px rgba(0, 0, 0, 0.34));
  }

  .vehicle-card b {
    display: block;
    font-size: 0.94rem;
    line-height: 1.15;
    letter-spacing: 0;
    overflow-wrap: anywhere;
  }

  .vehicle-card span {
    color: var(--muted);
    display: block;
    font-size: 0.78rem;
    line-height: 1.25;
    margin-top: 4px;
    min-width: 0;
    overflow-wrap: anywhere;
  }

  .action-panel {
    padding: 12px;
  }

  .actions-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .main-action {
    grid-column: 1 / -1;
    border: 0;
    min-height: 48px;
    border-radius: 13px;
    color: #07111d;
    background: linear-gradient(135deg, #ffe36c, #ff943a);
    font-weight: 800;
    box-shadow: 0 14px 26px rgba(255, 140, 58, 0.25);
  }

  .secondary-action {
    min-height: 42px;
    border-radius: 12px;
    border: 1px solid var(--line);
    color: var(--text);
    background: rgba(255, 255, 255, 0.08);
  }

  .status {
    margin-top: 10px;
    min-height: 44px;
    color: var(--muted);
    font-size: 0.91rem;
    line-height: 1.42;
  }

  .status.good {
    color: var(--green);
  }

  .status.warn {
    color: var(--yellow);
  }

  .status.bad {
    color: var(--danger);
  }

  .status.win {
    color: var(--green);
    font-weight: 700;
  }

  .progress {
    display: flex;
    gap: 6px;
    margin-top: 10px;
  }

  .dot {
    flex: 1;
    height: 7px;
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.16);
    overflow: hidden;
  }

  .dot.on {
    background: linear-gradient(90deg, var(--cyan), var(--green));
    box-shadow: 0 0 14px rgba(93, 231, 255, 0.4);
  }

  @media (max-width: 1020px) {
    .shell {
      grid-template-columns: 1fr;
    }

    .stage {
      height: min(64svh, 620px);
      min-height: 430px;
    }

    .side {
      height: auto;
      overflow: visible;
      grid-template-columns: 1fr;
    }

    .vehicle-panel {
      overflow: visible;
    }

    .vehicles {
      grid-template-columns: repeat(4, minmax(0, 1fr));
    }

    .vehicle-card {
      grid-template-columns: 1fr;
      min-height: 132px;
      text-align: center;
    }

    .vehicle-card img {
      height: 78px;
    }
  }

  @media (max-width: 720px) {
    .app {
      padding: 8px;
      gap: 8px;
    }

    .shell,
    .stage-shell,
    .stage,
    .panel,
    .topbar {
      width: 100%;
      max-width: calc(100vw - 16px);
    }

    .topbar {
      align-items: flex-start;
    }

    .pill-button {
      display: none;
    }

    h1 {
      font-size: 1.35rem;
    }

    .stage {
      height: min(58svh, 560px);
      min-height: 390px;
      border-radius: 14px;
      background-position: center;
    }

    .mission-tabs {
      top: 8px;
      left: 8px;
      right: 8px;
      gap: 6px;
    }

    .mission-tab {
      min-height: 34px;
      padding: 0 10px;
      font-size: 0.82rem;
    }

    .scene-copy {
      top: 52px;
      left: 10px;
      right: 10px;
      width: auto;
      padding: 12px;
      border-radius: 12px;
    }

    .scene-copy h2 {
      font-size: 1.15rem;
    }

    .scene-copy p {
      font-size: 0.8rem;
      line-height: 1.38;
    }

    .prop {
      width: calc(var(--wm, var(--w)) * 1%);
    }

    .vehicle-runner {
      width: 43%;
      bottom: 10%;
    }

    .side {
      gap: 8px;
    }

    .mission-panel,
    .plan-panel,
    .task-panel,
    .vehicle-panel,
    .action-panel {
      padding: 10px;
    }

    .mission-panel {
      display: none;
    }

    .vehicles {
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .vehicle-card {
      min-height: 122px;
      padding: 6px;
    }

    .vehicle-card img {
      height: 68px;
    }

    .vehicle-card b {
      font-size: 0.86rem;
    }

    .vehicle-card span {
      font-size: 0.72rem;
    }
  }

  @media (max-width: 420px) {
    .stage {
      height: 54svh;
      min-height: 360px;
    }

    .actions-grid {
      grid-template-columns: 1fr;
    }

    .main-action {
      grid-column: auto;
    }

    .vehicles {
      grid-template-columns: 1fr;
    }

    .vehicle-card {
      grid-template-columns: 42% minmax(0, 1fr);
      min-height: 104px;
      text-align: left;
    }

    .vehicle-card img {
      height: 84px;
    }
  }
</style>
</head>
<body>
<main class="app">
  <header class="topbar">
    <div class="brand">
      <a class="back" href="./">← Lucky's Playground</a>
      <h1>Lucas 的未来工程车实验室</h1>

        { id: "barrier", label: "路障", image: "prop_traffic_barrier_future.png", x: 28, y: 70, w: 11, wm: 18, action: "push", vehicles: ["bulldozer"], doneText: "入口路障被推开。" },
        { id: "rock", label: "岩层", image: "prop_rock_pile.png", x: 43, y: 68, w: 13, wm: 19, action: "drill", vehicles: ["drill"], needs: ["barrier"], doneText: "岩层被钻开。" },
        { id: "crystal", label: "晶体", image: "prop_energy_crystal.png", x: 59, y: 66, w: 10, wm: 15, action: "dig", vehicles: ["excavator"], needs: ["rock"], doneText: "能源晶体被挖出来。" },

        { id: "cargo", label: "货箱", image: "prop_cargo_box.png", x: 55, y: 67, w: 10, wm: 16, action: "lift", vehicles: ["crane"], doneText: "补给货箱被吊走。" },

      energy: 6,
      props: [
        { id: "barrier", label: "隔离栏", image: "prop_traffic_barrier_future.png", x: 25, y: 70, w: 11, wm: 18, action: "push", vehicles: ["bulldozer", "loader"], doneText: "隔离栏被清走。" },
        { id: "gap", label: "断口", image: "prop_bridge_gap.png", finalImage: "prop_bridge_piece.png", finalClass: "bridge-made", x: 43, y: 72, w: 14, wm: 20, action: "bridge", vehicles: ["bridge"], doneText: "断口被桥板连接。" },
        { id: "road", label: "路面", image: "prop_cracked_road.png", x: 58, y: 73, w: 12, wm: 18, action: "roll", vehicles: ["roller"], needs: ["gap"], doneText: "实验路面被压平。" },
        { id: "ramp", label: "坡道", image: "prop_mini_ramp.png", x: 73, y: 72, w: 12, wm: 18, action: "jump", vehicles: ["monster"], needs: ["road"], doneText: "大脚车通过坡道。" },
        { id: "crystal", label: "样本", image: "prop_energy_crystal.png", x: 86, y: 66, w: 9, wm: 14, action: "dig", vehicles: ["excavator"], doneText: "实验样本被挖出。" }
      ],
      success: "实验场完成一轮完整测试。"
    },
    {
      id: "grand-build",
      tab: "05 总装",
      title: "超级工程总装线",
      text: "综合任务，根据现场状态一步步判断。",
      goal: "把泥块、岩层、晶体、货箱、缺口、路面和坡道全部处理完。",
      bg: "bg_energy_mine_16x9.png",
      energy: 8,
      props: [
        { id: "mud", label: "泥块", image: "prop_mud_block.png", x: 23, y: 70, w: 10, wm: 16, action: "push", vehicles: ["bulldozer", "loader"], doneText: "泥块被推开。" },
        { id: "rock", label: "硬岩", image: "prop_rock_pile.png", x: 36, y: 68, w: 11, wm: 17, action: "drill", vehicles: ["drill"], needs: ["mud"], doneText: "硬岩被钻开。" },
        { id: "crystal", label: "晶体", image: "prop_energy_crystal.png", x: 49, y: 66, w: 9, wm: 14, action: "dig", vehicles: ["excavator"], needs: ["rock"], doneText: "晶体被挖出。" },
        { id: "cargo", label: "货箱", image: "prop_cargo_box.png", x: 61, y: 68, w: 9, wm: 14, action: "lift", vehicles: ["crane"], needs: ["crystal"], doneText: "货箱被吊走。" },
        { id: "gap", label: "缺口", image: "prop_bridge_gap.png", finalImage: "prop_bridge_piece.png", finalClass: "bridge-made", x: 72, y: 72, w: 12, wm: 18, action: "bridge", vehicles: ["bridge"], needs: ["cargo"], doneText: "缺口被修好。" },
        { id: "road", label: "裂缝", image: "prop_cracked_road.png", x: 83, y: 73, w: 10, wm: 16, action: "roll", vehicles: ["roller"], needs: ["gap"], doneText: "裂缝被压平。" },
        { id: "ramp", label: "终点坡", image: "prop_mini_ramp.png", x: 92, y: 72, w: 9, wm: 15, action: "jump", vehicles: ["monster"], needs: ["road"], doneText: "大脚车完成终点跳跃。" }
      ],
      success: "超级工程总装线跑通。"
    }
  ];

  const stage = document.getElementById("stage");
  const missionTabs = document.getElementById("missionTabs");
  const propsLayer = document.getElementById("propsLayer");
  const vehicleGrid = document.getElementById("vehicleGrid");
  const selectedStrip = document.getElementById("selectedStrip");
  const taskList = document.getElementById("taskList");
  const status = document.getElementById("status");
  const progressDots = document.getElementById("progressDots");
  const energyMeter = document.getElementById("energyMeter");
  const sceneTitle = document.getElementById("sceneTitle");
  const sceneText = document.getElementById("sceneText");
  const missionName = document.getElementById("missionName");
  const missionGoal = document.getElementById("missionGoal");
  const finishBurst = document.getElementById("finishBurst");
  const nextBtn = document.getElementById("nextBtn");
  const restartBtn = document.getElementById("restartBtn");
  const hintBtn = document.getElementById("hintBtn");
  const resetBtn = document.getElementById("resetBtn");
  const soundBtn = document.getElementById("soundBtn");

  let missionIndex = 0;
  let selectedVehicleId = "bulldozer";
  let completedTargets = new Set();
  let completed = new Set();
  let energy = 0;
  let animating = false;
  let missionComplete = false;
  let failed = false;
  let soundOn = true;
  let audioContext = null;

  function asset(name) {
    return BASE + name;
  }

  function currentMission() {
    return missions[missionIndex];
  }

  function setStatus(message, type = "") {
    status.textContent = message;
    status.className = `status ${type}`.trim();
  }

  function wait(ms) {
    return new Promise((resolve) => window.setTimeout(resolve, ms));
  }

  function allowedVehicleNames(target) {
    return target.vehicles.map((id) => vehicleMap[id].short).join(" / ");
  }

  function isDone(target) {
    return completedTargets.has(target.id);
  }

  function isUnlocked(target) {
    return !target.needs || target.needs.every((id) => completedTargets.has(id));
  }

  function getTarget(targetId) {
    return currentMission().props.find((target) => target.id === targetId);
  }

  function playTone(vehicle) {
    if (!soundOn) return;
    try {
      audioContext ||= new (window.AudioContext || window.webkitAudioContext)();
      const now = audioContext.currentTime;
      vehicle.sound.forEach((freq, index) => {
        const osc = audioContext.createOscillator();
        const gain = audioContext.createGain();
        osc.type = index === 1 ? "triangle" : "sawtooth";
        osc.frequency.setValueAtTime(freq, now + index * 0.08);
        gain.gain.setValueAtTime(0.0001, now + index * 0.08);
        gain.gain.exponentialRampToValueAtTime(0.08, now + index * 0.08 + 0.03);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + index * 0.08 + 0.22);
        osc.connect(gain);
        gain.connect(audioContext.destination);
        osc.start(now + index * 0.08);
        osc.stop(now + index * 0.08 + 0.24);
      });
    } catch (error) {
      soundOn = false;
      soundBtn.textContent = "静音";
    }
  }

  function playErrorTone() {
    if (!soundOn) return;
    try {
      audioContext ||= new (window.AudioContext || window.webkitAudioContext)();
      const now = audioContext.currentTime;
      const osc = audioContext.createOscillator();
      const gain = audioContext.createGain();
      osc.type = "square";
      osc.frequency.setValueAtTime(120, now);
      osc.frequency.exponentialRampToValueAtTime(70, now + 0.22);
      gain.gain.setValueAtTime(0.0001, now);
      gain.gain.exponentialRampToValueAtTime(0.06, now + 0.03);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.24);
      osc.connect(gain);
      gain.connect(audioContext.destination);
      osc.start(now);
      osc.stop(now + 0.26);
    } catch (error) {
      soundOn = false;
      soundBtn.textContent = "静音";
    }
  }

  function renderTabs() {
    missionTabs.innerHTML = "";
    missions.forEach((mission, index) => {
      const button = document.createElement("button");
      button.type = "button";
      button.className = "mission-tab";
      if (index === missionIndex) button.classList.add("active");
      if (completed.has(mission.id)) button.classList.add("done");
      button.textContent = completed.has(mission.id) ? `${mission.tab} ✓` : mission.tab;
      button.addEventListener("click", () => loadMission(index));
      missionTabs.appendChild(button);
    });
  }

  function renderSelected() {
    const vehicle = vehicleMap[selectedVehicleId];
    selectedStrip.innerHTML = `
      <div class="selected-vehicle">
        <img src="${asset(vehicle.image)}" alt="${vehicle.name}">
        <span>
          <b>${vehicle.name}</b>
          <span>${vehicle.skill}</span>
        </span>
      </div>
    `;
  }

  function renderVehicles() {
    vehicleGrid.innerHTML = "";
    vehicles.forEach((vehicle, index) => {
      const button = document.createElement("button");
      button.type = "button";
      button.className = "vehicle-card";
      if (selectedVehicleId === vehicle.id) button.classList.add("selected");
      button.innerHTML = `
        <img src="${asset(vehicle.image)}" alt="${vehicle.name}" loading="lazy">
        <span>
          <b>${index + 1}. ${vehicle.name}</b>
          <span>${vehicle.skill}</span>
        </span>
      `;
      button.addEventListener("click", () => selectVehicle(vehicle.id));
      vehicleGrid.appendChild(button);
    });
  }

  function targetState(target) {
    if (isDone(target)) return "done";
    if (!isUnlocked(target)) return "blocked";
    return "available";
  }

  function renderProps() {
    propsLayer.innerHTML = "";
    currentMission().props.forEach((target) => {
      const state = targetState(target);
      const item = document.createElement("div");
      item.className = `prop ${state}`;
      if (state === "done" && target.finalClass) item.classList.add(target.finalClass);
      item.dataset.id = target.id;
      item.tabIndex = 0;
      item.setAttribute("role", "button");
      item.setAttribute("aria-label", target.label);
      item.style.setProperty("--x", target.x);
      item.style.setProperty("--y", target.y);
      item.style.setProperty("--w", target.w);
      if (target.wm) item.style.setProperty("--wm", target.wm);
      const image = state === "done" && target.finalImage ? target.finalImage : target.image;
      item.innerHTML = `
        <img src="${asset(image)}" alt="${target.label}">
        <span class="prop-action"><img src="${asset(actionIcons[target.action])}" alt=""></span>
        <span class="prop-label">${target.label}</span>
      `;
      item.addEventListener("click", () => tryTarget(target.id));
      item.addEventListener("keydown", (event) => {
        if (event.key === "Enter" || event.key === " ") {
          event.preventDefault();
          tryTarget(target.id);
        }
      });
      propsLayer.appendChild(item);
    });
  }

  function renderTasks() {
    taskList.innerHTML = "";
    currentMission().props.forEach((target) => {
      const state = targetState(target);
      const button = document.createElement("button");
      button.type = "button";
      button.className = `task-card ${state}`;
      const stateText = state === "done" ? "✓" : state === "blocked" ? "锁" : "点";
      button.innerHTML = `
        <img src="${asset(actionIcons[target.action])}" alt="">
        <span>
          <b>${target.label} · ${actionNames[target.action]}</b>
          <span>${state === "blocked" ? "先处理前置目标" : allowedVehicleNames(target)}</span>
        </span>
        <span class="task-state">${stateText}</span>
      `;
      button.addEventListener("click", () => tryTarget(target.id));
      taskList.appendChild(button);
    });
  }

  function renderProgress() {
    const mission = currentMission();
    progressDots.innerHTML = "";
    mission.props.forEach((target) => {
      const dot = document.createElement("div");
      dot.className = isDone(target) ? "dot on" : "dot";
      progressDots.appendChild(dot);
    });
  }

  function renderEnergy() {
    const mission = currentMission();
    energyMeter.innerHTML = "";
    for (let i = 0; i < mission.energy; i += 1) {
      const cell = document.createElement("div");
      cell.className = i < energy ? "energy-cell on" : "energy-cell";
      energyMeter.appendChild(cell);
    }
  }

  function renderAll() {
    renderTabs();
    renderSelected();
    renderVehicles();
    renderProps();
    renderTasks();
    renderProgress();
    renderEnergy();
  }

  function applyBackground() {
    const mission = currentMission();
    const bg = isMobile.matches && mission.mobileBg ? mission.mobileBg : mission.bg;
    stage.style.backgroundImage = `url("${asset(bg)}")`;
  }

  function selectVehicle(vehicleId) {
    if (animating) return;
    selectedVehicleId = vehicleId;
    renderSelected();
    renderVehicles();
    const vehicle = vehicleMap[vehicleId];
    setStatus(`已选择：${vehicle.short}。现在点一下现场目标。`);
  }

  function flashTarget(targetId, className = "focus-target") {
    const element = propsLayer.querySelector(`[data-id="${targetId}"]`);
    if (!element) return;
    element.classList.add(className);
    window.setTimeout(() => element.classList.remove(className), 520);
  }

  async function animateVehicleToTarget(vehicle, target) {
    const img = document.createElement("img");
    img.className = "vehicle-runner";
    img.src = asset(vehicle.image);
    img.alt = vehicle.name;
    img.style.setProperty("--target", target.x);
    img.style.setProperty("--scale", vehicle.id === "crane" || vehicle.id === "bridge" ? "1.06" : "1");
    stage.appendChild(img);
    await wait(40);
    img.classList.add("drive");
    playTone(vehicle);
    await wait(1180);
    completedTargets.add(target.id);
    setStatus(target.doneText || `${vehicle.short}完成了${target.label}。`, "good");
    renderProps();
    renderTasks();
    renderProgress();
    await wait(360);
    img.classList.add("exit");
    await wait(720);
    img.remove();
  }

  async function tryTarget(targetId) {
    if (animating) return;
    if (failed) {
      setStatus("能量用完了。点“重开”再试一次。", "bad");
      return;
    }
    if (missionComplete) {
      setStatus("这个任务已经完成，可以进入下一个任务。", "win");
      return;
    }
    const target = getTarget(targetId);
    if (!target) return;
    if (isDone(target)) {
      setStatus(`${target.label}已经完成了。`, "good");
      return;
    }
    if (!isUnlocked(target)) {
      const missing = target.needs.filter((id) => !completedTargets.has(id)).map((id) => getTarget(id).label).join("、");
      flashTarget(target.id);
      setStatus(`这里还不能处理。先完成：${missing}。`, "warn");
      return;
    }
    const vehicle = vehicleMap[selectedVehicleId];
    if (!target.vehicles.includes(vehicle.id)) {
      energy = Math.max(0, energy - 1);
      playErrorTone();
      renderEnergy();
      flashTarget(target.id, "wrong");
      if (energy === 0) {
        failed = true;
        setStatus(`能量用完了。${target.label}需要 ${allowedVehicleNames(target)}。`, "bad");
      } else {
        setStatus(`${vehicle.short}不适合处理${target.label}。试试 ${allowedVehicleNames(target)}。`, "bad");
      }
      return;
    }
    animating = true;
    nextBtn.disabled = true;
    restartBtn.disabled = true;
    hintBtn.disabled = true;
    await animateVehicleToTarget(vehicle, target);
    animating = false;
    nextBtn.disabled = false;
    restartBtn.disabled = false;
    hintBtn.disabled = false;
    if (currentMission().props.every((item) => completedTargets.has(item.id))) {
      completeMission();
    }
  }

  function completeMission() {
    missionComplete = true;
    completed.add(currentMission().id);
    renderTabs();
    finishBurst.classList.remove("show");
    void finishBurst.offsetWidth;
    finishBurst.classList.add("show");
    const stars = energy >= currentMission().energy - 1 ? "三星" : energy >= 2 ? "二星" : "一星";
    setStatus(`${currentMission().success} 获得${stars}。`, "win");
  }

  function showHint() {
    if (animating) return;
    if (failed) {
      setStatus("能量用完了。点“重开”会恢复现场。", "bad");
      return;
    }
    const next = currentMission().props.find((target) => !isDone(target) && isUnlocked(target));
    const blocked = currentMission().props.find((target) => !isDone(target));
    const target = next || blocked;
    if (!target) {
      setStatus("任务已经完成。", "win");
      return;
    }
    flashTarget(target.id);
    setStatus(`提示：${target.label}需要${actionNames[target.action]}，可用 ${allowedVehicleNames(target)}。`, "warn");
  }

  function resetMission() {
    if (animating) return;
    completedTargets = new Set();
    energy = currentMission().energy;
    missionComplete = false;
    failed = false;
    renderAll();
    setStatus("现场已重置。选一辆车，再点现场目标。");
  }

  function nextMission() {
    if (animating) return;
    if (!missionComplete) {
      setStatus("先完成当前任务。也可以直接点上方任务标签切换。", "warn");
      return;
    }
    loadMission((missionIndex + 1) % missions.length);
  }

  function loadMission(index) {
    if (animating) return;
    missionIndex = index;
    completedTargets = new Set();
    energy = currentMission().energy;
    missionComplete = false;
    failed = false;
    const mission = currentMission();
    sceneTitle.textContent = mission.title;
    sceneText.textContent = mission.text;
    missionName.textContent = mission.title;
    missionGoal.textContent = mission.goal;
    applyBackground();
    renderAll();
    setStatus("选一辆车，再点击现场目标。");
  }

  nextBtn.addEventListener("click", nextMission);
  hintBtn.addEventListener("click", showHint);
  restartBtn.addEventListener("click", resetMission);
  resetBtn.addEventListener("click", resetMission);
  soundBtn.addEventListener("click", () => {
    soundOn = !soundOn;
    soundBtn.textContent = soundOn ? "🔊 声音" : "静音";
  });
  finishBurst.addEventListener("animationend", () => finishBurst.classList.remove("show"));
  isMobile.addEventListener("change", applyBackground);

  window.addEventListener("keydown", (event) => {
    if (event.key === "Enter") {
      showHint();
    }
    if (event.key === "Backspace") {
      resetMission();
    }
    if (event.key >= "1" && event.key <= "8") {
      selectVehicle(vehicles[Number(event.key) - 1].id);
    }
  });

  loadMission(0);
})();
</script>
</body>
</html>
