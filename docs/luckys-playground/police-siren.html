<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0e27">
<title>🚓 Lucky's Police Siren</title>
<style>
  :root {
    --red: #ff2040;
    --blue: #2060ff;
    --yellow: #ffcb05;
    --day-sky-1: #c5dffc;
    --day-sky-2: #e8f1fb;
    --night-sky-1: #0a0e27;
    --night-sky-2: #1a2a5a;
  }

  *, *::before, *::after {
    margin: 0; padding: 0; box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    user-select: none;
  }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    color: #fff;
    touch-action: manipulation;
  }

  body {
    display: flex;
    flex-direction: column;
    background: linear-gradient(to bottom, var(--night-sky-1) 0%, var(--night-sky-2) 60%, #2a1a0a 100%);
    padding: env(safe-area-inset-top, 0) env(safe-area-inset-right, 0)
             env(safe-area-inset-bottom, 0) env(safe-area-inset-left, 0);
    transition: background 0.6s ease;
  }

  body.day {
    background: linear-gradient(to bottom, var(--day-sky-1) 0%, var(--day-sky-2) 60%, #c8b088 100%);
    color: #1a2045;
  }

  /* Top bar */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px 4px;
    font-size: 13px;
    letter-spacing: 0.05em;
  }
  .topbar a { color: inherit; opacity: 0.7; text-decoration: none; }
  .topbar a:hover { opacity: 1; }
  .topbar .title { font-weight: 700; opacity: 0.85; }

  /* Country selector */
  .countries {
    display: flex;
    justify-content: center;
    gap: 12px;
    padding: 10px 12px 8px;
  }
  .flag-btn {
    font-size: 40px;
    width: 70px;
    height: 70px;
    border-radius: 20px;
    background: rgba(255,255,255,0.08);
    border: 3px solid transparent;
    cursor: pointer;
    transition: transform .15s, background .15s, border-color .15s;
    display: flex; align-items: center; justify-content: center;
    line-height: 1;
    font-family: 'Apple Color Emoji', 'Segoe UI Emoji', system-ui, sans-serif;
  }
  body.day .flag-btn { background: rgba(0,0,0,0.05); }
  .flag-btn:active { transform: scale(.92); }
  .flag-btn.active {
    border-color: #fff;
    background: rgba(255,255,255,0.22);
    transform: scale(1.06);
  }
  body.day .flag-btn.active {
    border-color: #1a2045;
    background: rgba(0,0,0,0.10);
  }

  /* Scene */
  .scene {
    flex: 1;
    min-height: 0;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: flex-end;
    justify-content: center;
  }
  .scene::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: url("assets/lucky-playground-assets-final-50-v2/police-road-night.png");
    background-size: auto 100%;
    background-position: 0 center;
    background-repeat: repeat-x;
    z-index: 0;
    pointer-events: none;
    transition: filter .4s, opacity .4s;
  }
  body.day .scene::before {
    background-image: url("assets/lucky-playground-assets-final-50-v2/police-road-day.png");
  }
  body.on .scene::before {
    animation: policeSceneFlow 4.6s linear infinite;
  }
  @keyframes policeSceneFlow {
    from { background-position: 0 center; }
    to   { background-position: -1024px center; }
  }

  /* Stars (night) */
  .stars {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(1px 1px at 15% 18%, #fff, transparent),
      radial-gradient(1px 1px at 38% 12%, #fff, transparent),
      radial-gradient(1px 1px at 62% 22%, #fff, transparent),
      radial-gradient(2px 2px at 78% 8%,  #fff, transparent),
      radial-gradient(1px 1px at 92% 18%, #fff, transparent),
      radial-gradient(1px 1px at 20% 30%, #fff, transparent),
      radial-gradient(1px 1px at 50% 6%,  #fff, transparent);
    opacity: 0.85;
    transition: opacity .5s;
    display: none;
  }
  body.day .stars { opacity: 0; }

  /* Moon / Sun */
  .celestial {
    position: absolute;
    top: 8%;
    right: 10%;
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background: #fff8d6;
    box-shadow: 0 0 36px rgba(255,248,214,0.5);
    transition: all .6s;
    display: none;
  }
  body.day .celestial {
    background: #ffd54a;
    box-shadow: 0 0 50px rgba(255,213,74,0.7), 0 0 90px rgba(255,213,74,0.4);
  }

  /* Distant buildings */
  .skyline {
    position: absolute;
    bottom: 22%;
    left: 0; right: 0;
    height: 80px;
    pointer-events: none;
    opacity: 0.6;
    display: none;
  }
  body.day .skyline { opacity: 0.35; }

  /* Road */
  .road {
    position: absolute;
    bottom: 0;
    left: 0; right: 0;
    height: 22%;
    background: linear-gradient(to bottom, #2a2420 0%, #1a1a1a 100%);
    border-top: 2px solid #3a3530;
    display: none;
  }
  body.day .road {
    background: linear-gradient(to bottom, #5c5448 0%, #3c3832 100%);
    border-top-color: #1a1a1a;
  }
  .lane {
    position: absolute;
    top: 50%;
    left: 0; right: 0;
    height: 4px;
    background-image: repeating-linear-gradient(to right,
      var(--yellow) 0 30px, transparent 30px 60px);
    background-size: 60px 100%;
    background-repeat: repeat;
    opacity: 0.8;
  }
  /* When siren is on: car faces right → ground flows leftward so the car looks like it's driving forward */
  body.on .lane {
    animation: laneMove 0.45s linear infinite;
  }
  @keyframes laneMove {
    from { background-position: 0 0; }
    to   { background-position: -60px 0; }
  }
  /* subtle parallax: skyline drifts slowly leftward too (slower) */
  body.on .skyline {
    animation: skylineDrift 14s linear infinite;
  }
  @keyframes skylineDrift {
    from { transform: translateX(0); }
    to   { transform: translateX(-25%); }
  }
  /* truck bounces gently while driving */
  @keyframes carDrive {
    0%, 100% { transform: translateY(0); }
    25%      { transform: translateY(-1.5px) rotate(-.15deg); }
    75%      { transform: translateY(-1.5px) rotate(.15deg); }
  }
  body.on .car { animation: carDrive 0.35s ease-in-out infinite; }

  /* Car stage */
  .car-wrap {
    width: 100%;
    max-width: 760px;
    position: relative;
    margin-bottom: 5%;
    z-index: 2;
  }
  .car {
    width: 100%;
    height: auto;
    display: none;
    filter: drop-shadow(0 16px 22px rgba(0,0,0,0.55));
  }
  body.us #car-us { display: block; }
  body.uk #car-uk { display: block; }
  body.cn #car-cn { display: block; }
  .asset-car {
    width: var(--asset-car-width, 112%);
    height: auto;
    margin-left: var(--asset-car-left, -6%);
    margin-bottom: var(--asset-car-drop, -28%);
    display: none;
    filter: drop-shadow(0 18px 22px rgba(0,0,0,0.55));
  }
  body.us #asset-car-us { display: block; --asset-car-drop: -32%; }
  body.cn #asset-car-cn { display: block; --asset-car-drop: -28%; }
  body.uk #asset-car-uk {
    display: block;
    --asset-car-width: 82%;
    --asset-car-left: 9%;
    --asset-car-drop: -32%;
  }
  body.us #car-us,
  body.cn #car-cn,
  body.uk #car-uk { display: none; }
  body.on .asset-car { animation: carDrive 0.35s ease-in-out infinite; }

  /* Halo behind car */
  .halo {
    position: absolute;
    left: 50%;
    top: 50%;
    width: 120%;
    height: 140%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    background: radial-gradient(ellipse at center, transparent 0%, transparent 100%);
    transition: background .2s;
    z-index: 1;
  }
  body.on .halo { animation: haloFlash .5s infinite; }
  @keyframes haloFlash {
    0%, 45%   { background: radial-gradient(ellipse at center, rgba(255,32,64,0.42) 0%, transparent 55%); }
    50%, 100% { background: radial-gradient(ellipse at center, rgba(32,96,255,0.42) 0%, transparent 55%); }
  }
  body.uk.on .halo { animation: haloFlashBlue .5s infinite; }
  @keyframes haloFlashBlue {
    0%, 45%   { background: radial-gradient(ellipse at center, rgba(32,96,255,0.50) 0%, transparent 55%); }
    50%, 100% { background: radial-gradient(ellipse at center, rgba(20,60,200,0.25) 0%, transparent 55%); }
  }

  /* ==== Light bulb animations ==== */
  .light {
    transition: fill 50ms linear, filter 50ms linear;
  }
  @keyframes redFlash {
    0%, 40%   { fill: var(--red); filter: drop-shadow(0 0 12px var(--red)) drop-shadow(0 0 26px var(--red)); }
    50%, 100% { fill: #3a0c18; filter: none; }
  }
  @keyframes blueFlash {
    0%, 40%   { fill: var(--blue); filter: drop-shadow(0 0 12px var(--blue)) drop-shadow(0 0 26px var(--blue)); }
    50%, 100% { fill: #0a1040; filter: none; }
  }
  @keyframes blueFlash2 {
    0%, 40%   { fill: #0a1040; filter: none; }
    50%, 100% { fill: var(--blue); filter: drop-shadow(0 0 12px var(--blue)) drop-shadow(0 0 26px var(--blue)); }
  }

  body.on .flash-red  { animation: redFlash  .5s infinite; }
  body.on .flash-blue { animation: blueFlash .5s infinite .25s; }
  /* UK: all lights blue, staggered */
  body.uk.on .flash-red  { animation: blueFlash  .5s infinite; }
  body.uk.on .flash-blue { animation: blueFlash2 .5s infinite; }

  /* Controls row */
  .controls {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
    padding: 8px 14px 6px;
    align-items: center;
  }
  .ctl-btn {
    background: rgba(255,255,255,0.08);
    border: 2px solid rgba(255,255,255,0.12);
    color: inherit;
    padding: 12px 8px;
    border-radius: 14px;
    font-family: inherit;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    transition: transform .12s, background .12s;
  }
  body.day .ctl-btn {
    background: rgba(0,0,0,0.06);
    border-color: rgba(0,0,0,0.12);
  }
  .ctl-btn .ctl-icon { font-size: 22px; line-height: 1; }
  .ctl-btn .ctl-label { font-size: 11px; opacity: 0.75; letter-spacing: 0.04em; }
  .ctl-btn:active { transform: scale(.94); }
  .ctl-btn:hover { background: rgba(255,255,255,0.15); }
  body.day .ctl-btn:hover { background: rgba(0,0,0,0.10); }
  .ctl-btn.horn-active {
    background: var(--yellow) !important;
    color: #1a1a1a;
    transform: scale(1.05);
  }

  /* Siren button */
  .siren-wrap {
    display: flex;
    justify-content: center;
    padding: 6px 20px 22px;
  }
  .siren-btn {
    width: 170px;
    height: 170px;
    border-radius: 50%;
    border: none;
    background: radial-gradient(circle at 35% 30%, #ff6a80, #cc0020 60%, #8a0018 100%);
    color: #fff;
    font-size: 20px;
    font-weight: 900;
    letter-spacing: 0.18em;
    cursor: pointer;
    box-shadow:
      0 12px 40px rgba(255,32,64,0.30),
      inset 0 -10px 24px rgba(0,0,0,0.35),
      inset 0 8px 18px rgba(255,255,255,0.18);
    transition: transform .1s, box-shadow .1s;
    font-family: inherit;
    position: relative;
  }
  .siren-btn:active { transform: scale(.94); }
  body.on .siren-btn { animation: btnPulse .6s infinite; }
  @keyframes btnPulse {
    0%, 45% {
      box-shadow:
        0 0 0 5px rgba(255,32,64,0.55),
        0 12px 42px rgba(255,32,64,0.6),
        inset 0 -10px 24px rgba(0,0,0,0.35),
        inset 0 8px 18px rgba(255,255,255,0.18);
    }
    50%, 100% {
      box-shadow:
        0 0 0 5px rgba(32,96,255,0.55),
        0 12px 42px rgba(32,96,255,0.6),
        inset 0 -10px 24px rgba(0,0,0,0.35),
        inset 0 8px 18px rgba(255,255,255,0.18);
    }
  }
  .siren-btn .on-label, .siren-btn .off-label {
    display: block;
  }
  body.on .siren-btn .off-label { display: none; }
  body:not(.on) .siren-btn .on-label { display: none; }

  .hint {
    text-align: center;
    font-size: 12px;
    opacity: 0.45;
    padding: 0 20px 12px;
    letter-spacing: 0.03em;
  }

  /* Small phones */
  @media (max-width: 380px) {
    .flag-btn { font-size: 34px; width: 58px; height: 58px; border-radius: 16px; }
    .ctl-btn { padding: 10px 4px; font-size: 12px; }
    .ctl-btn .ctl-icon { font-size: 20px; }
    .siren-btn { width: 140px; height: 140px; font-size: 17px; }
  }
  @media (max-height: 620px) {
    .countries { padding: 4px 10px; gap: 10px; }
    .flag-btn { font-size: 30px; width: 54px; height: 54px; border-radius: 14px; border-width: 2px; }
    .car-wrap { max-width: 480px; margin-bottom: 2%; }
    .siren-btn { width: 120px; height: 120px; font-size: 15px; }
    .siren-wrap { padding: 4px 20px 10px; }
    .hint { padding: 0 20px 4px; font-size: 10px; }
    .controls { padding: 4px 12px; gap: 8px; }
  }
</style>
</head>
<body class="us">

<div class="topbar">
  <a href="./" aria-label="back to playground">← Playground</a>
  <div class="title">🚓 Police Siren</div>
</div>

<div class="countries" role="radiogroup">
  <button class="flag-btn active" data-country="us" aria-label="USA">🇺🇸</button>
  <button class="flag-btn" data-country="uk" aria-label="UK">🇬🇧</button>
  <button class="flag-btn" data-country="cn" aria-label="China">🇨🇳</button>
</div>

<div class="scene">
  <div class="stars"></div>
  <div class="celestial"></div>

    <polygon points="0,80 0,55 30,55 30,35 55,35 55,50 80,50 80,25 110,25 110,48 140,48 140,30 175,30 175,55 210,55 210,40 240,40 240,50 275,50 275,22 305,22 305,45 340,45 340,58 375,58 375,35 410,35 410,48 440,48 440,30 475,30 475,55 505,55 505,40 535,40 535,52 570,52 570,28 600,28 600,45 635,45 635,55 670,55 670,38 705,38 705,50 740,50 740,30 775,30 775,55 800,55 800,80"

        <circle cx="450" cy="246" r="42" fill="#0a0a0a"/>

        <g stroke="#1a1a1a" stroke-width="5" stroke-linecap="round">
          <line x1="450" y1="225" x2="450" y2="267"/>

<div class="controls">
  <button class="ctl-btn" id="dayNightBtn" aria-label="Toggle day/night">

    <span class="ctl-label" id="dayNightLabel">白天</span>

  <button class="ctl-btn" id="modeBtn" aria-label="Cycle siren mode">
    <span class="ctl-icon">🎵</span>

  </button>
  <button class="ctl-btn" id="hornBtn" aria-label="Horn">
    <span class="ctl-icon">📯</span>
    <span class="ctl-label">Horn</span>
  </button>
</div>

<div class="siren-wrap">
  <button class="siren-btn" id="sirenBtn" aria-label="Toggle siren">
    <span class="off-label">SIREN</span>
    <span class="on-label">STOP</span>
  </button>
</div>
<div class="hint" id="hint">点 SIREN 开警笛 · 📯 喇叭 · 🎵 切换声音 · ☀️ 白天黑夜</div>

<script>
(function () {
  'use strict';

  // === Audio ===
  let audioCtx = null;
  let masterGain = null;
  let running = false;
  let activeOsc = null;
  let sirenTimer = null;

  function ensureCtx() {
    if (!audioCtx) {
      const AC = window.AudioContext || window.webkitAudioContext;
      audioCtx = new AC();
      masterGain = audioCtx.createGain();
      masterGain.gain.value = 0.22;
      masterGain.connect(audioCtx.destination);
    }
    if (audioCtx.state === 'suspended') audioCtx.resume();
  }

  function stopSiren() {
    running = false;
    document.body.classList.remove('on');
    if (sirenTimer) { clearTimeout(sirenTimer); sirenTimer = null; }
    if (activeOsc) {
      try { activeOsc.stop(); } catch (e) {}
      try { activeOsc.disconnect(); } catch (e) {}
      activeOsc = null;
    }
  }

  // Sweep siren (wail): slow freq sweep
  function sweepSiren(period, fLo, fHi, type) {
    const osc = audioCtx.createOscillator();
    osc.type = type || 'sawtooth';
    osc.connect(masterGain);
    activeOsc = osc;
    let scheduledUntil = audioCtx.currentTime;
    const schedule = () => {
      if (!running || activeOsc !== osc) return;
      const now = audioCtx.currentTime;
      const target = now + Math.max(2, period * 3);
      while (scheduledUntil < target) {
        osc.frequency.setValueAtTime(fLo, scheduledUntil);
        osc.frequency.linearRampToValueAtTime(fHi, scheduledUntil + period * 0.5);
        osc.frequency.linearRampToValueAtTime(fLo, scheduledUntil + period);
        scheduledUntil += period;
      }
      sirenTimer = setTimeout(schedule, Math.max(1200, period * 1000));
    };
    schedule();
    osc.start();
  }

  // Two-tone (UK Nee-Naw + US Hi-Lo)
  function twoToneSiren(dur, fLo, fHi, type) {
    const osc = audioCtx.createOscillator();
    osc.type = type || 'square';
    osc.connect(masterGain);
    activeOsc = osc;
    let scheduledUntil = audioCtx.currentTime;
    let high = false;
    const schedule = () => {
      if (!running || activeOsc !== osc) return;
      const now = audioCtx.currentTime;
      const target = now + 3;
      while (scheduledUntil < target) {
        osc.frequency.setValueAtTime(high ? fHi : fLo, scheduledUntil);
        high = !high;
        scheduledUntil += dur;
      }
      sirenTimer = setTimeout(schedule, 2200);
    };
    schedule();
    osc.start();
  }

  // Phaser siren (rapid AM-like alternation)
  function phaserSiren() {
    const osc = audioCtx.createOscillator();
    osc.type = 'square';
    osc.connect(masterGain);
    activeOsc = osc;
    let scheduledUntil = audioCtx.currentTime;
    let high = false;
    const step = 0.05;
    const schedule = () => {
      if (!running || activeOsc !== osc) return;
      const now = audioCtx.currentTime;
      const target = now + 2;
      while (scheduledUntil < target) {
        osc.frequency.setValueAtTime(high ? 1600 : 900, scheduledUntil);
        high = !high;
        scheduledUntil += step;
      }
      sirenTimer = setTimeout(schedule, 1500);
    };
    schedule();
    osc.start();
  }

  // Horn: quick air-horn blast (one-shot, doesn't affect siren)
  let hornReleaseTimer = null;
  function playHorn() {
    ensureCtx();
    const now = audioCtx.currentTime;
    const osc1 = audioCtx.createOscillator();
    const osc2 = audioCtx.createOscillator();
    osc1.type = 'sawtooth'; osc1.frequency.value = 220;
    osc2.type = 'square';   osc2.frequency.value = 330;
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(0, now);
    g.gain.linearRampToValueAtTime(0.28, now + 0.02);
    g.gain.setValueAtTime(0.28, now + 0.35);
    g.gain.exponentialRampToValueAtTime(0.0001, now + 0.5);
    osc1.connect(g); osc2.connect(g); g.connect(masterGain);
    osc1.start(now); osc2.start(now);
    osc1.stop(now + 0.52); osc2.stop(now + 0.52);
    hornBtn.classList.add('horn-active');
    clearTimeout(hornReleaseTimer);
    hornReleaseTimer = setTimeout(() => hornBtn.classList.remove('horn-active'), 400);
    if (navigator.vibrate) navigator.vibrate(80);
  }

  // === Siren modes catalog ===
  const SIREN_MODES = {
    us: [
      { name: 'Wail',  play: () => sweepSiren(2.2, 500, 1400, 'sawtooth') },
      { name: 'Yelp',  play: () => sweepSiren(0.18, 700, 1500, 'sawtooth') },
      { name: 'Hi-Lo', play: () => twoToneSiren(0.38, 650, 975, 'square') },
      { name: 'Phaser', play: phaserSiren }
    ],
    uk: [
      { name: 'Two-Tone', play: () => twoToneSiren(0.85, 650, 820, 'square') },
      { name: 'Wail',     play: () => sweepSiren(2.2, 500, 1400, 'sawtooth') },
      { name: 'Yelp',     play: () => sweepSiren(0.18, 700, 1500, 'sawtooth') }
    ],
    cn: [
      { name: 'Wail',   play: () => sweepSiren(2.0, 480, 1350, 'sawtooth') },
      { name: 'Yelp',   play: () => sweepSiren(0.20, 700, 1450, 'sawtooth') },
      { name: 'Hi-Lo',  play: () => twoToneSiren(0.55, 700, 980, 'square') }
    ]
  };

  let currentCountry = 'us';
  let currentModeIdx = 0;

  // === UI wiring ===
  const sirenBtn = document.getElementById('sirenBtn');
  const hornBtn  = document.getElementById('hornBtn');
  const modeBtn  = document.getElementById('modeBtn');
  const modeLabel = document.getElementById('modeLabel');
  const dayNightBtn = document.getElementById('dayNightBtn');
  const dayNightIcon = document.getElementById('dayNightIcon');
  const dayNightLabel = document.getElementById('dayNightLabel');

  function updateModeLabel() {
    const mode = SIREN_MODES[currentCountry][currentModeIdx];
    modeLabel.textContent = mode.name;
  }

  function startSiren() {
    ensureCtx();
    stopSiren();
    running = true;
    document.body.classList.add('on');
    SIREN_MODES[currentCountry][currentModeIdx].play();
  }

  function setCountry(country) {
    if (currentCountry === country) return;
    currentCountry = country;
    currentModeIdx = 0;
    document.querySelectorAll('.flag-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.country === country);
    });
    document.body.classList.remove('us', 'uk', 'cn');
    document.body.classList.add(country);
    updateModeLabel();
    if (running) startSiren();
  }

  function bootFromUrl() {
    const params = new URLSearchParams(window.location.search);
    const country = (params.get('country') || '').trim().toLowerCase();
    if (['us', 'uk', 'cn'].includes(country)) setCountry(country);
  }

  function cycleMode() {
    const modes = SIREN_MODES[currentCountry];
    currentModeIdx = (currentModeIdx + 1) % modes.length;
    updateModeLabel();
    if (running) startSiren();
  }

  function toggleDayNight() {
    const isDay = document.body.classList.toggle('day');
    dayNightIcon.textContent = isDay ? '🌙' : '☀️';
    dayNightLabel.textContent = isDay ? '夜晚' : '白天';
  }

  sirenBtn.addEventListener('click', () => {
    if (running) stopSiren(); else startSiren();
  });
  hornBtn.addEventListener('click', playHorn);
  modeBtn.addEventListener('click', cycleMode);
  dayNightBtn.addEventListener('click', toggleDayNight);

  document.querySelectorAll('.flag-btn').forEach(btn => {
    btn.addEventListener('click', () => setCountry(btn.dataset.country));
  });

  document.addEventListener('visibilitychange', () => {
    if (document.hidden && running) stopSiren();
  });

  let lastTouch = 0;
  document.addEventListener('touchend', e => {
    const now = Date.now();
    if (now - lastTouch < 320) e.preventDefault();
    lastTouch = now;
  }, { passive: false });

  updateModeLabel();
  bootFromUrl();
})();
</script>
