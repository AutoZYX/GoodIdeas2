<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0e27">
<title>🛠️ Lucky's Truck Mixer · 超级组合车</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --accent: #ffcb05;
    --accent-2: #ff8a05;
    --red: #ff2040;
    --blue: #2060ff;
    --green: #4ade80;
  }

  *, *::before, *::after {
    margin: 0; padding: 0; box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    user-select: none;
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    color: #fff;
    touch-action: manipulation;
    background: radial-gradient(ellipse at top, #1a2a5a 0%, #0a0e27 70%);
  }
  body {
    display: flex; flex-direction: column;
    padding: env(safe-area-inset-top, 0) env(safe-area-inset-right, 0)
             env(safe-area-inset-bottom, 0) env(safe-area-inset-left, 0);
  }

  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 18px 6px; font-size: 14px; opacity: 0.85;
  }
  .topbar a { color: inherit; opacity: 0.7; text-decoration: none; }
  .topbar a:hover { opacity: 1; }
  .topbar .title {
    font-family: 'Playfair Display', Georgia, serif;
    font-weight: 800; font-size: 18px;
  }

  .label-row {
    text-align: center; font-size: 13px; opacity: 0.6;
    padding: 8px 16px 4px; letter-spacing: 0.06em; font-weight: 500;
  }

  .vehicles {
    display: grid; grid-template-columns: repeat(5, 1fr);
    gap: 8px; padding: 4px 12px 6px;
  }
  .vehicle-card {
    aspect-ratio: 1; min-height: 72px;
    background: rgba(255,255,255,0.07);
    border: 3px solid rgba(255,255,255,0.10);
    border-radius: 16px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    cursor: pointer; padding: 4px; position: relative; gap: 3px;
    transition: transform .2s, background .2s, border-color .2s;
  }
  .vehicle-card:active { transform: scale(.94); }
  .vehicle-card.selected {
    border-color: var(--accent);
    background: rgba(255,203,5,0.18);
    box-shadow: 0 0 24px rgba(255,203,5,0.3);
  }
  .vehicle-card.selected::after {
    content: '✓'; position: absolute;
    top: 4px; right: 6px;
    background: var(--green); color: #000;
    width: 20px; height: 20px; border-radius: 50%;
    font-size: 14px; font-weight: 900;
    display: flex; align-items: center; justify-content: center;
  }
  .vehicle-card .v-icon { width: 56px; height: 38px; flex-shrink: 0; }
  .vehicle-card .v-cn { font-size: 14px; font-weight: 700; line-height: 1.1; }
  .vehicle-card .v-en {
    font-family: 'Inter', sans-serif;
    font-size: 10px; opacity: 0.6; line-height: 1;
    letter-spacing: 0.05em; font-style: italic;
  }

  .stage {
    flex: 1; min-height: 0; position: relative; overflow: hidden;
    margin: 6px 10px; border-radius: 18px;
    background:
      radial-gradient(ellipse at 70% 15%, rgba(255,203,5,0.12) 0%, transparent 45%),
      linear-gradient(to bottom,
        rgba(30,52,98,0.55) 0%,
        rgba(18,26,58,0.75) 60%,
        rgba(48,30,10,0.85) 78%,
        rgba(14,8,2,0.95) 100%);
    border: 1px solid rgba(255,255,255,0.08);
    box-shadow: inset 0 2px 0 rgba(255,255,255,0.04);
  }
  .stage::before {
    content: '';
    position: absolute; left: 0; right: 0; bottom: 18%;
    height: 40px;
    background:
      radial-gradient(ellipse 130px 30px at 10% 100%, rgba(0,0,0,0.30) 0%, transparent 70%),
      radial-gradient(ellipse 180px 36px at 35% 100%, rgba(0,0,0,0.38) 0%, transparent 70%),
      radial-gradient(ellipse 140px 30px at 58% 100%, rgba(0,0,0,0.32) 0%, transparent 70%),
      radial-gradient(ellipse 210px 38px at 82% 100%, rgba(0,0,0,0.40) 0%, transparent 70%);
    pointer-events: none;
  }

  .placeholder {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    font-family: 'Playfair Display', Georgia, serif;
    font-size: clamp(17px, 4.5vw, 26px);
    font-weight: 700; line-height: 1.5;
    opacity: 0.55; text-align: center; padding: 20px; z-index: 2;
  }
  .placeholder .big { font-size: 2em; display: block; margin-bottom: 10px; }
  .placeholder .hint {
    font-family: 'Inter', sans-serif;
    font-weight: 400; font-size: 0.65em; font-style: italic;
    display: block; margin-top: 8px; opacity: 0.75;
  }
  .placeholder.hidden { display: none; }

  .result {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    opacity: 0; pointer-events: none; z-index: 3;
  }
  .result.show { opacity: 1; pointer-events: auto; }

  .result-name {
    padding: 16px 16px 6px; text-align: center; z-index: 4;
  }
  .result-name .cn {
    font-family: 'Playfair Display', Georgia, "Noto Serif SC", serif;
    font-size: clamp(22px, 5.6vw, 34px); font-weight: 800;
    letter-spacing: 0.03em;
    background: linear-gradient(90deg, #ffd670, #ff9a3a);
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent;
    line-height: 1.15;
    text-shadow: 0 2px 12px rgba(0,0,0,0.25);
  }
  .result-name .en {
    font-family: 'Inter', sans-serif;
    font-size: clamp(12px, 3.1vw, 16px);
    font-weight: 500; font-style: italic;
    color: rgba(255,255,255,0.72);
    margin-top: 4px; letter-spacing: 0.04em;
  }
  .result.show .result-name { animation: nameAppear .55s .25s both; }
  @keyframes nameAppear {
    0%   { opacity: 0; transform: translateY(-10px); }
    100% { opacity: 1; transform: translateY(0); }
  }

  .truck-scene {
    flex: 1; min-height: 0;
    position: relative;
    display: flex; align-items: flex-end; justify-content: center;
    overflow: hidden;
  }
  #hybridTruck {
    width: 100%; max-width: 1100px;
    height: auto; display: block; max-height: 100%;
    filter: drop-shadow(0 -6px 20px rgba(0,0,0,0.4));
    transform-origin: center bottom;
  }
  .result.show #hybridTruck {
    animation: truckAppear .65s cubic-bezier(.34,1.56,.50,1) both;
  }
  @keyframes truckAppear {
    0%   { opacity: 0; transform: scale(.5) translateY(30px); }
    60%  { opacity: 1; transform: scale(1.04) translateY(-2px); }
    100% { opacity: 1; transform: scale(1) translateY(0); }
  }

  .stage.running .road-dashes {
    animation: dashFlow 0.55s linear infinite;
  }
  @keyframes dashFlow {
    from { transform: translateX(0); }
    to   { transform: translateX(-90px); }
  }

  /* ==== Flashing police lights ==== */
  @keyframes redFlash  {
    0%, 40%   { fill: #ff2040; filter: drop-shadow(0 0 10px #ff2040) drop-shadow(0 0 22px #ff2040); }
    50%, 100% { fill: #3a0c18; filter: none; }
  }
  @keyframes blueFlash {
    0%, 40%   { fill: #2060ff; filter: drop-shadow(0 0 10px #2060ff) drop-shadow(0 0 22px #2060ff); }
    50%, 100% { fill: #0a1040; filter: none; }
  }
  .has-police .flash-red  { animation: redFlash  .5s infinite; }
  .has-police .flash-blue { animation: blueFlash .5s infinite .25s; }

  /* ==== Chassis / Overlay visibility rules ==== */
  .chassis { display: none; }
  .primary-police    .chassis-police    { display: inline; }
  .primary-monster   .chassis-monster   { display: inline; }
  .primary-loader    .chassis-loader    { display: inline; }
  .primary-crane     .chassis-crane     { display: inline; }
  .primary-excavator .chassis-excavator { display: inline; }

  /* Each chassis has native attachment slots that light up when that addon is selected (non-primary) */
  [class*="attach-"] { display: none; }

  .primary-police.has-loader    .chassis-police .attach-loader    { display: inline; }
  .primary-police.has-crane     .chassis-police .attach-crane     { display: inline; }
  .primary-police.has-excavator .chassis-police .attach-excavator { display: inline; }
  .primary-police.has-monster   .chassis-police .attach-monster-wheels { display: inline; }
  .primary-police.has-monster   .chassis-police .attach-standard-wheels { display: none; }
  .primary-police .chassis-police .attach-standard-wheels { display: inline; }

  .primary-monster.has-police    .chassis-monster .attach-police    { display: inline; }
  .primary-monster.has-loader    .chassis-monster .attach-loader    { display: inline; }
  .primary-monster.has-crane     .chassis-monster .attach-crane     { display: inline; }
  .primary-monster.has-excavator .chassis-monster .attach-excavator { display: inline; }

  .primary-loader.has-police    .chassis-loader .attach-police    { display: inline; }
  .primary-loader.has-crane     .chassis-loader .attach-crane     { display: inline; }
  .primary-loader.has-excavator .chassis-loader .attach-excavator { display: inline; }
  .primary-loader.has-monster   .chassis-loader .attach-monster-wheels { display: inline; }
  .primary-loader.has-monster   .chassis-loader .attach-standard-wheels { display: none; }
  .primary-loader .chassis-loader .attach-standard-wheels { display: inline; }

  .primary-crane.has-police    .chassis-crane .attach-police    { display: inline; }
  .primary-crane.has-loader    .chassis-crane .attach-loader    { display: inline; }
  .primary-crane.has-excavator .chassis-crane .attach-excavator { display: inline; }
  .primary-crane.has-monster   .chassis-crane .attach-monster-wheels { display: inline; }
  .primary-crane.has-monster   .chassis-crane .attach-standard-wheels { display: none; }
  .primary-crane .chassis-crane .attach-standard-wheels { display: inline; }

  .primary-excavator.has-police { }
  .primary-excavator.has-police    .chassis-excavator .attach-police    { display: inline; }
  .primary-excavator.has-loader    .chassis-excavator .attach-loader    { display: inline; }
  .primary-excavator.has-crane     .chassis-excavator .attach-crane     { display: inline; }
  /* excavator is tracked: monster overlay would be big wheels replacing tracks */
  .primary-excavator.has-monster   .chassis-excavator .attach-monster-wheels { display: inline; }
  .primary-excavator.has-monster   .chassis-excavator .tracks-base { display: none; }

  /* ==== Gentle animations for active features ==== */
  @keyframes craneSway {
    0%, 100% { transform: rotate(0); }
    50%      { transform: rotate(-1.2deg); }
  }
  @keyframes digMotion {
    0%, 100% { transform: rotate(0); }
    50%      { transform: rotate(-2.5deg); }
  }
  @keyframes scoopMotion {
    0%, 100% { transform: translateY(0); }
    50%      { transform: translateY(-4px); }
  }
  @keyframes monsterBounce {
    0%, 100% { transform: translateY(0) rotate(0); }
    50%      { transform: translateY(-3px) rotate(.4deg); }
  }

  .has-crane .crane-arm {
    transform-origin: 490px 270px;
    animation: craneSway 2s ease-in-out infinite;
  }
  .has-excavator .excavator-arm {
    transform-origin: 230px 260px;
    animation: digMotion 2.5s ease-in-out infinite;
  }
  .has-loader .loader-bucket-anim {
    animation: scoopMotion 2.2s ease-in-out infinite;
  }
  .primary-monster .truck-bounce {
    animation: monsterBounce 1.1s ease-in-out infinite;
  }

  /* ==== Bottom bar ==== */
  .bottombar {
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px; padding: 10px 16px 20px;
  }
  .btn-reset {
    min-width: 56px; height: 48px;
    padding: 0 14px; border-radius: 14px;
    background: rgba(255,255,255,0.08);
    border: 2px solid rgba(255,255,255,0.12);
    cursor: pointer; color: #fff;
    font-size: 16px; font-family: inherit; font-weight: 600;
    transition: transform .12s, background .12s;
    display: flex; align-items: center; gap: 6px;
  }
  .btn-reset:hover { background: rgba(255,255,255,0.15); }
  .btn-reset:active { transform: scale(.92); }

  .status-hint {
    flex: 1; text-align: right;
    font-size: 13px; font-style: italic; opacity: 0.55;
    letter-spacing: 0.03em; transition: color .2s;
  }
  .status-hint.pending { color: var(--accent); opacity: 0.85; }
  .status-hint .dot {
    display: inline-block;
    width: 6px; height: 6px; background: var(--accent);
    border-radius: 50%; margin-right: 4px; vertical-align: middle;
    animation: pendingPulse .8s infinite alternate;
  }
  .status-hint:not(.pending) .dot { display: none; }
  @keyframes pendingPulse {
    from { transform: scale(.7); opacity: 0.5; }
    to   { transform: scale(1.1); opacity: 1; }
  }

  /* ==== Responsive ==== */
  @media (max-width: 380px) {
    .vehicle-card .v-icon { width: 46px; height: 30px; }
    .vehicle-card .v-cn { font-size: 12px; }
    .vehicle-card .v-en { font-size: 9px; }
    .btn-reset { font-size: 14px; height: 44px; }
    .status-hint { font-size: 11px; }
  }
  @media (max-height: 640px) {
    .vehicles { padding: 2px 10px 4px; gap: 6px; }
    .vehicle-card { min-height: 60px; }
    .label-row { padding: 4px 16px 0; font-size: 11px; }
    .bottombar { padding: 6px 14px 12px; }
    .btn-reset { height: 44px; }
  }
</style>
</head>
<body>

<div class="topbar">
  <a href="./">← Playground</a>
  <div class="title">🛠️ 超级组合车 · Truck Mixer</div>
</div>

<div class="label-row">选 2+ 辆车，自动组合 · Pick 2+ to auto-combine</div>

<!-- ============================ VEHICLE CARDS ============================ -->
<div class="vehicles" id="vehicleCards">
  <div class="vehicle-card" data-vehicle="police">
    <svg class="v-icon" viewBox="0 0 100 60">
      <rect x="10" y="22" width="80" height="20" rx="4" fill="#f0f0f0"/>
      <rect x="10" y="32" width="80" height="10" fill="#111"/>
      <path d="M 18 22 L 30 12 L 70 12 L 82 22 Z" fill="#f0f0f0"/>
      <path d="M 22 20 L 32 14 L 68 14 L 78 20 Z" fill="#223a6a" opacity="0.8"/>
      <rect x="38" y="6" width="24" height="8" rx="1.5" fill="#222"/>
      <rect x="40" y="8" width="10" height="4" fill="#ff2040"/>
      <rect x="50" y="8" width="10" height="4" fill="#2060ff"/>
      <circle cx="28" cy="46" r="8" fill="#1a1a1a"/><circle cx="28" cy="46" r="3" fill="#666"/>
      <circle cx="72" cy="46" r="8" fill="#1a1a1a"/><circle cx="72" cy="46" r="3" fill="#666"/>
    </svg>
    <div class="v-cn">警车</div>
    <div class="v-en">Police</div>
  </div>

  <div class="vehicle-card" data-vehicle="loader">
    <svg class="v-icon" viewBox="0 0 100 60">
      <rect x="46" y="20" width="32" height="22" rx="2" fill="#ffc820"/>
      <rect x="50" y="12" width="22" height="10" rx="2" fill="#ffc820"/>
      <rect x="52" y="14" width="18" height="6" fill="#3a6090" opacity=".7"/>
      <path d="M 44 32 L 18 36 L 14 46 L 32 48 L 44 42 Z" fill="#ffaa00"/>
      <path d="M 14 46 L 6 48 L 4 52 L 14 52 Z" fill="#c08000"/>
      <circle cx="30" cy="48" r="8" fill="#1a1a1a"/><circle cx="30" cy="48" r="3" fill="#666"/>
      <circle cx="70" cy="48" r="8" fill="#1a1a1a"/><circle cx="70" cy="48" r="3" fill="#666"/>
    </svg>
    <div class="v-cn">装载机</div>
    <div class="v-en">Loader</div>
  </div>

  <div class="vehicle-card" data-vehicle="crane">
    <svg class="v-icon" viewBox="0 0 100 60">
      <rect x="10" y="30" width="70" height="14" rx="2" fill="#ffaa20"/>
      <rect x="18" y="22" width="18" height="10" rx="1.5" fill="#ffaa20"/>
      <path d="M 46 32 L 94 8 L 97 14 L 48 38 Z" fill="#ffd040"/>
      <line x1="94" y1="12" x2="94" y2="30" stroke="#333" stroke-width="1.2"/>
      <path d="M 91 30 L 97 30 L 97 36 Q 94 38 91 36 Z" fill="#888"/>
      <circle cx="24" cy="48" r="7" fill="#1a1a1a"/><circle cx="24" cy="48" r="3" fill="#666"/>
      <circle cx="60" cy="48" r="7" fill="#1a1a1a"/><circle cx="60" cy="48" r="3" fill="#666"/>
    </svg>
    <div class="v-cn">吊车</div>
    <div class="v-en">Crane</div>
  </div>

  <div class="vehicle-card" data-vehicle="excavator">
    <svg class="v-icon" viewBox="0 0 100 60">
      <rect x="20" y="42" width="60" height="10" rx="2" fill="#3a3a3a"/>
      <circle cx="26" cy="47" r="4" fill="#555"/>
      <circle cx="50" cy="47" r="4" fill="#555"/>
      <circle cx="74" cy="47" r="4" fill="#555"/>
      <rect x="30" y="28" width="38" height="14" rx="2" fill="#ff8800"/>
      <rect x="36" y="20" width="24" height="10" rx="1.5" fill="#ff8800"/>
      <path d="M 48 23 L 20 6 L 14 12 L 46 30 Z" fill="#ff9a00"/>
      <path d="M 18 9 L 6 26 L 12 30 L 22 14 Z" fill="#ff9a00"/>
      <path d="M 6 26 L 2 36 L 10 40 L 14 30 Z" fill="#c06020"/>
    </svg>
    <div class="v-cn">挖掘机</div>
    <div class="v-en">Excavator</div>
  </div>

  <div class="vehicle-card" data-vehicle="monster">
    <svg class="v-icon" viewBox="0 0 100 60">
      <rect x="22" y="18" width="56" height="16" rx="2" fill="#d83020"/>
      <rect x="28" y="10" width="30" height="10" rx="2" fill="#d83020"/>
      <rect x="30" y="12" width="26" height="6" fill="#3a6090" opacity=".7"/>
      <path d="M 30 30 Q 38 24 44 28 Q 50 22 58 28 L 58 34 L 30 34 Z" fill="#ffc000"/>
      <circle cx="24" cy="48" r="13" fill="#0a0a0a"/>
      <circle cx="24" cy="48" r="7" fill="#333"/>
      <circle cx="24" cy="48" r="3" fill="#aaa"/>
      <circle cx="76" cy="48" r="13" fill="#0a0a0a"/>
      <circle cx="76" cy="48" r="7" fill="#333"/>
      <circle cx="76" cy="48" r="3" fill="#aaa"/>
    </svg>
    <div class="v-cn">怪兽车</div>
    <div class="v-en">Monster</div>
  </div>
</div>

<!-- ============================ STAGE ============================ -->
<div class="stage">
  <div class="placeholder" id="placeholder">
    <span class="big">🤔</span>
    选 2 辆以上的车
    <span class="hint">Pick 2 or more vehicles above<br>to auto-combine</span>
  </div>

  <div class="result" id="result">
    <div class="result-name">
      <div class="cn" id="resultCn"></div>
      <div class="en" id="resultEn"></div>
    </div>
    <div class="truck-scene">
    <svg id="hybridTruck" viewBox="0 0 900 540" preserveAspectRatio="xMidYMax meet" xmlns="http://www.w3.org/2000/svg">

      <defs>
        <linearGradient id="flameGrad" x1="0" x2="0" y1="0" y2="1">
          <stop offset="0" stop-color="#ffee00"/>
          <stop offset="0.5" stop-color="#ff8800"/>
          <stop offset="1" stop-color="#d92200"/>
        </linearGradient>
        <linearGradient id="craneGrad" x1="0" x2="1" y1="0" y2="0">
          <stop offset="0" stop-color="#ffd040"/>
          <stop offset="1" stop-color="#ffa820"/>
        </linearGradient>
        <linearGradient id="excavatorGrad" x1="0" x2="0" y1="0" y2="1">
          <stop offset="0" stop-color="#ff9a28"/>
          <stop offset="1" stop-color="#c06010"/>
        </linearGradient>
        <linearGradient id="loaderGrad" x1="0" x2="0" y1="0" y2="1">
          <stop offset="0" stop-color="#ffce30"/>
          <stop offset="1" stop-color="#c0841a"/>
        </linearGradient>
        <linearGradient id="monsterGrad" x1="0" x2="0" y1="0" y2="1">
          <stop offset="0" stop-color="#ee3830"/>
          <stop offset="1" stop-color="#a0140a"/>
        </linearGradient>
        <linearGradient id="roadGrad" x1="0" x2="0" y1="0" y2="1">
          <stop offset="0" stop-color="#4a3420"/>
          <stop offset="0.35" stop-color="#2e2010"/>
          <stop offset="1" stop-color="#1a1208"/>
        </linearGradient>
      </defs>

      <!-- =====================================================================
           CHASSIS 1: POLICE SEDAN
           Classic Crown-Vic style black-and-white cruiser
           ===================================================================== -->
      <g class="chassis chassis-police">
        <g class="truck-bounce">
          <!-- Lower white body -->
          <path d="M 85 400 Q 85 318 115 310 L 205 298 L 270 215 Q 283 200 305 200 L 610 200 Q 632 200 645 215 L 705 290 L 810 300 Q 835 306 835 325 L 835 400 Z"
                fill="#f5f5f0" stroke="#1a1a1a" stroke-width="3" stroke-linejoin="round"/>
          <!-- Windshield + side windows -->
          <path d="M 275 210 L 225 300 L 375 300 L 375 210 Z" fill="#0a1628" opacity="0.85"/>
          <path d="M 385 210 L 385 300 L 555 300 L 555 210 Z" fill="#0a1628" opacity="0.85"/>
          <path d="M 565 210 L 565 300 L 700 300 L 640 210 Z" fill="#0a1628" opacity="0.85"/>
          <rect x="375" y="205" width="10" height="95" fill="#f5f5f0"/>
          <rect x="555" y="205" width="10" height="95" fill="#f5f5f0"/>

          <!-- Black lower body (classic B&W livery) -->
          <path d="M 95 340 L 100 400 L 830 400 L 830 340 Z" fill="#0c0c0c"/>
          <rect x="205" y="300" width="500" height="42" fill="#0c0c0c"/>

      selected.delete(v);
      card.classList.remove('selected');
    } else {
      selected.add(v);
      card.classList.add('selected');
    }
    updateStatus();
    scheduleAutoCombine();
  }

  function primaryOf(sel) {
    for (const v of CHASSIS_PRIORITY) if (sel.has(v)) return v;
    return 'police';
  }

  function buildName(sel) {
    const sorted = CHASSIS_PRIORITY.filter(v => sel.has(v));
    const count = sorted.length;
    const prefixCn = count >= 5 ? '终极无敌' : count >= 4 ? '超级' : count >= 3 ? '多功能' : '';
    const prefixEn = count >= 5 ? 'Ultimate ' : count >= 4 ? 'Super ' : count >= 3 ? 'Multi-' : '';
    const cn = prefixCn + sorted.map(v => NAMES[v].cn).join('+') + '车';
    const en = prefixEn + sorted.map(v => NAMES[v].en).join('-') + ' Truck';
    return { cn, en };
  }

  function combine() {
    if (selected.size < 2) return;

    const primary = primaryOf(selected);
    // Force reflow so animation restarts
    result.className = 'result';
    void result.offsetWidth;

    let cls = 'result show primary-' + primary;
    selected.forEach(v => { cls += ' has-' + v; });
    result.className = cls;
    placeholder.classList.add('hidden');
    stage.classList.add('running');

    const name = buildName(selected);
    resultCn.textContent = name.cn;
    resultEn.textContent = name.en;

    statusHint.textContent = '✨ 组合完成！';
    statusHint.classList.remove('pending');

    playCombineSfx();
    if (navigator.vibrate) navigator.vibrate([40, 50, 80]);
  }

  function reset() {
    clearTimeout(autoTimer);
    selected.clear();
    cards.forEach(c => c.classList.remove('selected'));
    result.className = 'result';
    placeholder.classList.remove('hidden');
    stage.classList.remove('running');
    resultCn.textContent = '';
    resultEn.textContent = '';
    updateStatus();
  }

  // === Combine chime ===
  let audioCtx = null;
  function playCombineSfx() {
    try {
      if (!audioCtx) {
        const AC = window.AudioContext || window.webkitAudioContext;
        audioCtx = new AC();
      }
      if (audioCtx.state === 'suspended') audioCtx.resume();

      const notes = [523.25, 659.25, 783.99, 1046.50];
      const now = audioCtx.currentTime;
      const step = 0.09;

      notes.forEach((freq, i) => {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'triangle';
        osc.frequency.value = freq;
        const start = now + i * step;
        gain.gain.setValueAtTime(0, start);
        gain.gain.linearRampToValueAtTime(0.22, start + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.001, start + 0.55);
        osc.connect(gain).connect(audioCtx.destination);
        osc.start(start);
        osc.stop(start + 0.6);
      });
    } catch (e) {}
  }

  cards.forEach(card => card.addEventListener('click', () => pickCard(card)));
  resetBtn.addEventListener('click', reset);
  updateStatus();

  let lastTouch = 0;
  document.addEventListener('touchend', e => {
    const now = Date.now();
    if (now - lastTouch < 320) e.preventDefault();
    lastTouch = now;
  }, { passive: false });
})();
</script>
