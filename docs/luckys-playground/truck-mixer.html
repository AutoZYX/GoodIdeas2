<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0e27">
<title>🛠️ Lucky's Truck Mixer · 超级组合车</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --accent: #ffcb05;
    --accent-2: #ff8a05;
    --red: #ff2040;
    --blue: #2060ff;
    --green: #4ade80;
  }

  *, *::before, *::after {
    margin: 0; padding: 0; box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    user-select: none;
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    color: #fff;
    touch-action: manipulation;
    background: radial-gradient(ellipse at top, #1a2a5a 0%, #0a0e27 70%);
  }
  body {
    display: flex; flex-direction: column;
    padding: env(safe-area-inset-top, 0) env(safe-area-inset-right, 0)
             env(safe-area-inset-bottom, 0) env(safe-area-inset-left, 0);
  }

  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 18px 6px; font-size: 14px; opacity: 0.85;
    min-width: 0;
  }
  .topbar a { color: inherit; opacity: 0.7; text-decoration: none; flex: 0 0 auto; }
  .topbar a:hover { opacity: 1; }
  .topbar .title {
    font-family: 'Playfair Display', Georgia, serif;
    font-weight: 800; font-size: clamp(14px, 3.4vw, 18px);
    white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis;
    max-width: calc(100vw - 130px);
    min-width: 0;
  }

  .label-row {
    text-align: center; font-size: 13px; opacity: 0.6;
    padding: 8px 16px 4px; letter-spacing: 0.06em; font-weight: 500;
  }

  .vehicles {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px; padding: 4px 10px 6px;
    max-width: 1400px; margin: 0 auto; width: 100%;
  }
  @media (min-width: 720px) {
    .vehicles { grid-template-columns: repeat(8, 1fr); }
  }
  .vehicle-card {
    aspect-ratio: 5 / 6;
    min-height: 80px;
    background: rgba(255,255,255,0.07);
    border: 3px solid rgba(255,255,255,0.10);
    border-radius: 16px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    cursor: pointer; padding: 8px 4px 6px; position: relative; gap: 4px;
    transition: transform .2s, background .2s, border-color .2s, box-shadow .2s;
  }
  .vehicle-card:active { transform: scale(.94); }
  .vehicle-card:hover { background: rgba(255,255,255,0.12); }
  .vehicle-card.selected {
    border-color: var(--accent);
    background: rgba(255,203,5,0.18);
    box-shadow: 0 0 24px rgba(255,203,5,0.3);
  }
  .vehicle-card.selected::after {
    content: '✓'; position: absolute;
    top: 5px; right: 6px;
    background: var(--green); color: #000;
    width: 20px; height: 20px; border-radius: 50%;
    font-size: 13px; font-weight: 900;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 2px 6px rgba(0,0,0,0.3);
  }
  .vehicle-card .v-icon {
    width: 96%;
    max-width: 120px;
    height: auto; aspect-ratio: 10/6;
    flex-shrink: 0;
  }
  .vehicle-card img.v-icon {
    object-fit: contain;
    filter: drop-shadow(0 8px 12px rgba(0,0,0,0.30));
  }
  .vehicle-card .v-cn {
    font-size: clamp(12px, 3.4vw, 18px);
    font-weight: 800; line-height: 1.1;
    letter-spacing: 0.02em;
  }
  .vehicle-card .v-en {
    font-family: 'Inter', sans-serif;
    font-size: clamp(9px, 2.2vw, 12px);
    opacity: 0.62; line-height: 1;
    letter-spacing: 0.05em; font-style: italic;
  }
  @media (min-width: 720px) {
    .vehicle-card { aspect-ratio: 4 / 5; padding: 10px 6px 8px; }
    .vehicle-card .v-icon { width: 100%; max-width: 142px; }
  }

  .stage {
    flex: 1; min-height: 0; position: relative; overflow: hidden;
    margin: 6px 10px; border-radius: 18px;
    background:
      radial-gradient(ellipse at 70% 15%, rgba(255,203,5,0.12) 0%, transparent 45%),
      linear-gradient(to bottom,
        rgba(30,52,98,0.55) 0%,
        rgba(18,26,58,0.75) 60%,
        rgba(48,30,10,0.85) 78%,
        rgba(14,8,2,0.95) 100%);
    border: 1px solid rgba(255,255,255,0.08);
    box-shadow: inset 0 2px 0 rgba(255,255,255,0.04);
  }
  .stage::before {
    content: '';
    position: absolute; left: 0; right: 0; bottom: 18%;
    height: 40px;
    background:
      radial-gradient(ellipse 130px 30px at 10% 100%, rgba(0,0,0,0.30) 0%, transparent 70%),
      radial-gradient(ellipse 180px 36px at 35% 100%, rgba(0,0,0,0.38) 0%, transparent 70%),
      radial-gradient(ellipse 140px 30px at 58% 100%, rgba(0,0,0,0.32) 0%, transparent 70%),
      radial-gradient(ellipse 210px 38px at 82% 100%, rgba(0,0,0,0.40) 0%, transparent 70%);
    pointer-events: none;
  }

  .placeholder {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    font-family: 'Playfair Display', Georgia, serif;
    font-size: clamp(17px, 4.5vw, 26px);
    font-weight: 700; line-height: 1.5;
    opacity: 0.55; text-align: center; padding: 20px; z-index: 2;
  }
  .placeholder .big { font-size: 2em; display: block; margin-bottom: 10px; }
  .placeholder .hint {
    font-family: 'Inter', sans-serif;
    font-weight: 400; font-size: 0.65em; font-style: italic;
    display: block; margin-top: 8px; opacity: 0.75;
  }
  .placeholder.hidden { display: none; }

  .result {
    position: absolute; inset: 0;
    display: block;
    opacity: 0; pointer-events: none; z-index: 3;
  }
  .result.show { opacity: 1; pointer-events: auto; }

  .result-name {
    position: absolute;
    left: 0; right: 0; top: 0;
    padding: 14px 16px 32px; text-align: center; z-index: 5;
    background: linear-gradient(to bottom, rgba(8, 12, 28, 0.76), rgba(8, 12, 28, 0));
    pointer-events: none;
  }
  .result-name .cn {
    font-family: 'Playfair Display', Georgia, "Noto Serif SC", serif;
    font-size: clamp(22px, 5.6vw, 34px); font-weight: 800;
    letter-spacing: 0.03em;
    color: #ffd670;
    -webkit-text-fill-color: #ffd670;
    line-height: 1.15;
    text-shadow: 0 2px 12px rgba(0,0,0,0.25);
  }
  .result-name .en {
    font-family: 'Inter', sans-serif;
    font-size: clamp(12px, 3.1vw, 16px);
    font-weight: 500; font-style: italic;
    color: rgba(255,255,255,0.72);
    margin-top: 4px; letter-spacing: 0.04em;
  }
  .result.show .result-name { opacity: 1; transform: none; }
  @keyframes nameAppear {
    0%   { opacity: 0; transform: translateY(-10px); }
    100% { opacity: 1; transform: translateY(0); }
  }

  .truck-scene {
    position: absolute;
    inset: 0;
    display: flex; align-items: flex-end; justify-content: center;
    overflow: hidden;
  }
  .truck-scene::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: url("assets/lucky-playground-assets-final-50-v2/construction-road-night.png");
    background-size: auto 100%;
    background-position: 0 center;
    background-repeat: repeat-x;
    opacity: 0.98;
    z-index: 0;
    pointer-events: none;
  }
  .stage.running .truck-scene::before {
    animation: finalSceneFlow 5.4s linear infinite;
  }
  @keyframes finalSceneFlow {
    from { background-position: 0 center; }
    to   { background-position: -1024px center; }
  }

  /* ============ Full-width road with edge-to-edge lane lines ============ */
  .road-layer {
    position: absolute; left: 0; right: 0; bottom: 0;
    height: 34%;
    background: transparent;
    border-top: 0;
    z-index: 1; pointer-events: none;
  }
  .road-layer::before {
    /* Top curb stripe */
    content: ''; position: absolute; left: 0; right: 0; top: 0;
    height: 6px;
    background: repeating-linear-gradient(to right,
      rgba(255,255,255,0.18) 0 8px,
      rgba(0,0,0,0.25) 8px 16px);
    opacity: 0.7;
    display: none;
  }
  .road-layer::after {
    /* Full-width animated lane dashes */
    content: ''; position: absolute; left: 0; right: 0; top: 56%;
    height: 7px; transform: translateY(-50%);
    background-image: repeating-linear-gradient(to right,
      var(--accent) 0 60px,
      transparent 60px 120px);
    background-size: 120px 100%;
    background-repeat: repeat-x;
    opacity: 0.48;
    filter: drop-shadow(0 1px 2px rgba(0,0,0,0.4));
  }
  .stage.running .road-layer::after {
    animation: laneFlow 0.55s linear infinite;
  }
  @keyframes laneFlow {
    from { background-position: 0 0; }
    to   { background-position: -120px 0; }
  }

  /* ============ Roadside decorations (buildings + lamp posts + signs) ============ */
  .scene-deco {
    position: absolute; left: 0; right: 0; bottom: 17%;
    height: 80%; pointer-events: none; z-index: 1;
    overflow: hidden;
    display: none;
  }

  /* Far layer: distant city skyline (parallax slow) */
  .buildings-layer {
    position: absolute; left: 0; bottom: 0;
    width: 200%; height: 46%;  /* bigger than before */
    opacity: 0.85;
  }
  .buildings-layer svg {
    width: 100%; height: 100%; display: block;
  }
  .stage.running .buildings-layer {
    animation: scrollFar 18s linear infinite;
  }
  @keyframes scrollFar {
    from { transform: translateX(0); }
    to   { transform: translateX(-50%); }
  }

  /* Mid layer: closer trees/buildings (parallax medium) */
  .trees-layer {
    position: absolute; left: 0; bottom: 0;
    width: 200%; height: 30%;
    opacity: 0.85;
  }
  .trees-layer svg { width: 100%; height: 100%; display: block; }
  .stage.running .trees-layer {
    animation: scrollMid 10s linear infinite;
  }
  @keyframes scrollMid {
    from { transform: translateX(0); }
    to   { transform: translateX(-50%); }
  }

  /* Near layer: lamp posts + road signs (parallax fast, same as road) */
  .roadside-layer {
    position: absolute; left: 0; bottom: 0;
    width: 200%; height: 70%;
  }
  .stage.running .roadside-layer {
    animation: scrollNear 6s linear infinite;
  }
  @keyframes scrollNear {
    from { transform: translateX(0); }
    to   { transform: translateX(-50%); }
  }

  .lamp-post {
    position: absolute; bottom: 0;
    width: 4px; height: 42%;
    background: linear-gradient(to bottom, #2a2a2a 0%, #1a1a1a 100%);
  }
  .lamp-post::before {
    content: ''; position: absolute; top: -10px; left: -16px;
    width: 36px; height: 13px;
    border-radius: 4px 4px 2px 2px;
    background: linear-gradient(to bottom, #3a3a3a 0%, #1a1a1a 100%);
    border: 1px solid #0a0a0a;
  }
  .lamp-post::after {
    content: ''; position: absolute; top: -2px; left: -30px;
    width: 64px; height: 30px;
    background: radial-gradient(ellipse, rgba(255,220,130,0.55) 0%, transparent 70%);
    opacity: 0.9;
  }
  .road-sign {
    position: absolute; bottom: 20%;
    width: 44px; height: 32px;
    background: #1a4a9a;
    border: 2px solid #111;
    border-radius: 3px;
    box-shadow: 0 3px 8px rgba(0,0,0,0.5);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Inter', sans-serif;
    font-size: 11px; font-weight: 900; color: #fff;
    letter-spacing: 0.08em;
  }
  .road-sign::before {
    content: ''; position: absolute; bottom: -22px; left: 50%;
    transform: translateX(-50%);
    width: 3px; height: 22px;
    background: #1a1a1a;
  }
  .road-sign.stop { background: #d23a1a; }
  .road-sign.yield { background: #d2a320; color: #111; }
  .road-sign.highway { background: #1a7a3a; font-size: 10px; }

  /* ============ Truck SVG ============ */
  .asset-vehicle-stack {
    position: absolute;
    left: 50%;
    bottom: 10%;
    width: min(86vw, 880px);
    height: min(56vh, 460px);
    transform: translateX(-50%);
    z-index: 2;
    pointer-events: none;
    display: none;
  }
  .asset-vehicle {
    position: absolute;
    left: var(--asset-x, 50%);
    bottom: var(--asset-drop, -22%);
    width: var(--asset-width, 92%);
    max-height: 100%;
    object-fit: contain;
    object-position: center bottom;
    transform: translateX(-50%);
    display: none;
    filter:
      drop-shadow(0 18px 18px rgba(0,0,0,0.45))
      drop-shadow(0 4px 0 rgba(0,0,0,0.18));
  }
  .asset-ground-shadow {
    position: absolute;
    left: 50%;
    bottom: 1%;
    width: min(58vw, 620px);
    height: 30px;
    transform: translateX(-50%);
    border-radius: 50%;
    background: radial-gradient(ellipse, rgba(0,0,0,0.48) 0%, rgba(0,0,0,0.18) 45%, transparent 74%);
    display: none;
  }
  .asset-module-strip {
    position: absolute;
    left: 50%;
    top: 16%;
    width: min(92%, 760px);
    transform: translateX(-50%);
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 7px;
    flex-wrap: wrap;
    z-index: 7;
    pointer-events: none;
  }
  .asset-feature-chip {
    padding: 7px 10px;
    border-radius: 999px;
    background: rgba(255,255,255,0.92);
    color: #111;
    font-size: clamp(12px, 2.4vw, 15px);
    font-weight: 900;
    box-shadow: 0 8px 18px rgba(0,0,0,0.22);
    display: none;
    align-items: center;
    line-height: 1;
    white-space: nowrap;
  }
  .asset-module {
    position: absolute;
    display: none;
    object-fit: contain;
    pointer-events: none;
    z-index: 4;
    filter:
      drop-shadow(0 12px 12px rgba(0,0,0,0.34))
      drop-shadow(0 2px 0 rgba(0,0,0,0.18));
  }
  .asset-module-police {
    top: 35%;
    left: 50%;
    width: 18%;
    transform: translateX(-50%);
  }
  .asset-module-loader {
    right: 4%;
    bottom: -6%;
    width: 24%;
    transform: rotate(-2deg);
  }
  .asset-module-crane {
    right: 10%;
    top: 10%;
    width: 30%;
  }
  .asset-module-excavator {
    right: 7%;
    top: 18%;
    width: 24%;
  }
  .asset-module-wheel {
    bottom: 3%;
    width: 17%;
    z-index: 5;
  }
  .asset-module-wheel.rear { left: 29%; }
  .asset-module-wheel.front { right: 20%; }
  .has-police .asset-module-police,
  .has-crane .asset-module-crane,
  .has-excavator .asset-module-excavator,
  .has-monster .asset-module-wheel { display: block; }
  .primary-police .asset-module-police,
  .primary-loader .asset-module-loader,
  .primary-crane .asset-module-crane,
  .primary-excavator .asset-module-excavator,
  .primary-monster .asset-module-wheel { display: none; }
  .primary-monster .asset-vehicle-stack,
  .primary-loader .asset-vehicle-stack,
  .primary-crane .asset-vehicle-stack,
  .primary-excavator .asset-vehicle-stack,
  .primary-dumptruck .asset-vehicle-stack,
  .primary-bulldozer .asset-vehicle-stack,
  .primary-ambulance .asset-vehicle-stack { display: block; }
  .primary-monster .asset-monster,
  .primary-loader .asset-loader,
  .primary-crane .asset-crane,
  .primary-excavator .asset-excavator,
  .primary-dumptruck .asset-dumptruck,
  .primary-bulldozer .asset-bulldozer,
  .primary-ambulance .asset-ambulance,
  .primary-monster .asset-ground-shadow,
  .primary-loader .asset-ground-shadow,
  .primary-crane .asset-ground-shadow,
  .primary-excavator .asset-ground-shadow,
  .primary-dumptruck .asset-ground-shadow,
  .primary-bulldozer .asset-ground-shadow,
  .primary-ambulance .asset-ground-shadow { display: block; }
  .primary-monster .asset-monster { --asset-drop: -20%; --asset-width: 84%; }
  .primary-loader .asset-loader { --asset-drop: -27%; --asset-width: 90%; }
  .primary-crane .asset-crane { --asset-drop: -29%; --asset-width: 98%; }
  .primary-excavator .asset-excavator { --asset-drop: -19%; --asset-width: 88%; }
  .primary-dumptruck .asset-dumptruck { --asset-drop: -27%; --asset-width: 90%; }
  .primary-bulldozer .asset-bulldozer { --asset-drop: -24%; --asset-width: 92%; }
  .primary-ambulance .asset-ambulance { --asset-drop: -31%; --asset-width: 88%; }
  @media (max-width: 640px) {
    .asset-vehicle-stack {
      width: 100%;
      height: min(42vh, 300px);
      bottom: 17%;
    }
    .primary-monster .asset-monster { --asset-drop: -18%; --asset-width: 86%; }
    .primary-loader .asset-loader { --asset-drop: -22%; --asset-width: 55%; --asset-x: 42%; }
    .primary-crane .asset-crane { --asset-drop: -24%; --asset-width: 86%; }
    .primary-excavator .asset-excavator { --asset-drop: -16%; --asset-width: 78%; }
    .primary-dumptruck .asset-dumptruck { --asset-drop: -23%; --asset-width: 84%; }
    .primary-bulldozer .asset-bulldozer { --asset-drop: -20%; --asset-width: 86%; }
    .primary-ambulance .asset-ambulance { --asset-drop: -27%; --asset-width: 82%; }
    .asset-module-police { top: 34%; width: 22%; }
    .asset-module-strip { top: 16%; gap: 5px; }
    .asset-feature-chip { font-size: 11px; padding: 5px 8px; }
    .asset-module-loader { right: 3%; bottom: -3%; width: 24%; }
    .asset-module-crane { right: 8%; top: 13%; width: 31%; }
    .asset-module-excavator { right: 6%; top: 20%; width: 25%; }
    .asset-module-wheel { width: 18%; bottom: 5%; }
  }
  .primary-monster #hybridTruck,
  .primary-loader #hybridTruck,
  .primary-crane #hybridTruck,
  .primary-excavator #hybridTruck,
  .primary-dumptruck #hybridTruck,
  .primary-bulldozer #hybridTruck,
  .primary-ambulance #hybridTruck { display: none; }
  .result.show.has-police:not(.primary-police) .asset-chip-police,
  .result.show.has-loader:not(.primary-loader) .asset-chip-loader,
  .result.show.has-crane:not(.primary-crane) .asset-chip-crane,
  .result.show.has-excavator:not(.primary-excavator) .asset-chip-excavator,
  .result.show.has-bulldozer:not(.primary-bulldozer) .asset-chip-dozer,
  .result.show.has-dumptruck:not(.primary-dumptruck) .asset-chip-dumptruck,
  .result.show.has-ambulance:not(.primary-ambulance) .asset-chip-ambulance,
  .result.show.has-monster:not(.primary-monster) .asset-chip-monster { display: inline-flex; }
  .result.show .asset-vehicle-stack {
    animation: assetTruckAppear .65s cubic-bezier(.34,1.56,.50,1) both;
  }
  @keyframes assetTruckAppear {
    0%   { opacity: 0; transform: translateX(-50%) scale(.5) translateY(30px); }
    60%  { opacity: 1; transform: translateX(-50%) scale(1.04) translateY(-2px); }
    100% { opacity: 1; transform: translateX(-50%) scale(1) translateY(0); }
  }
  #hybridTruck {
    width: 100%; max-width: 1100px;
    height: auto; display: block; max-height: 100%;
    filter: drop-shadow(0 -6px 20px rgba(0,0,0,0.4));
    transform-origin: center bottom;
    position: relative; z-index: 2;
    /* Pull truck down so wheels kiss the CSS road top */
    margin-bottom: -2%;
  }
  .result.show #hybridTruck {
    animation: truckAppear .65s cubic-bezier(.34,1.56,.50,1) both;
  }
  @keyframes truckAppear {
    0%   { opacity: 0; transform: scale(.5) translateY(30px); }
    60%  { opacity: 1; transform: scale(1.04) translateY(-2px); }
    100% { opacity: 1; transform: scale(1) translateY(0); }
  }

  /* ============ Obstacles (crushed by the front wheel / front blade) ============
     The truck is centered in the scene and its front (right-facing) is
     roughly 28-30% right-of-center. Obstacles enter from the right, travel
     leftward at the same rate as the road lane dashes, and the crush keyframe
     fires right around the truck's front wheel position.
  */
  .obstacle {
    position: absolute;
    bottom: 15.5%;
    left: 100%;
    width: clamp(48px, 8vw, 76px);
    height: clamp(48px, 8vw, 76px);
    z-index: 3;
    display: none;
    will-change: transform;
    transform-origin: 50% 100%;
  }
  .primary-monster.show .obstacle,
  .primary-loader.show .obstacle,
  .primary-bulldozer.show .obstacle { display: block; }
  .obstacle img { width: 100%; height: 100%; display: block; object-fit: contain; filter: drop-shadow(0 8px 8px rgba(0,0,0,0.45)); }
  .obstacle-a { animation: obstacleRun 6s linear infinite; }
  .obstacle-b { animation: obstacleRun 6s linear infinite 1.2s; }
  .obstacle-c { animation: obstacleRun 6s linear infinite 2.4s; }
  .obstacle-d { animation: obstacleRun 6s linear infinite 3.6s; }
  .obstacle-e { animation: obstacleRun 6s linear infinite 4.8s; }

  /* Phase breakdown:
     The obstacle starts at the right edge. Around 42vw leftward travel it
     reaches the vehicle front wheel / blade, then collapses forward.
  */
  @keyframes obstacleRun {
    0%   { transform: translateX(0) translateY(0) rotate(0) scale(1);        opacity: 1; }
    36%  { transform: translateX(-36vw) translateY(0) rotate(0) scale(1);    opacity: 1; }
    42%  { transform: translateX(-42vw) translateY(0) rotate(0) scale(1);    opacity: 1; }

<!-- ============================ BOTTOM BAR ============================ -->
<div class="bottombar">
  <button class="btn-reset" id="resetBtn" aria-label="Reset">
    <span>🔄</span>
    <span>重来</span>
  </button>
  <div class="status-hint" id="statusHint"></div>
</div>

<script>
(function () {
  'use strict';

  // Order = chassis priority when multiple selected
  const CHASSIS_PRIORITY = [
    'monster',     // always wins: giant wheels + flames
    'excavator',   // tracked + arm
    'bulldozer',   // tracked + front blade
    'loader',      // articulated with bucket
    'crane',       // boom + outriggers
    'dumptruck',   // tilting bed
    'ambulance',   // van (emergency)
    'police'       // sedan (emergency)
  ];
  const NAMES = {
    police:    { cn: '警察',   en: 'Police' },
    loader:    { cn: '装载机', en: 'Loader' },
    crane:     { cn: '吊车',   en: 'Crane' },
    excavator: { cn: '挖掘机', en: 'Digger' },
    monster:   { cn: '怪兽',   en: 'Monster' },
    dumptruck: { cn: '翻斗',   en: 'Dump' },
    bulldozer: { cn: '推土',   en: 'Dozer' },
    ambulance: { cn: '救护',   en: 'Ambulance' }
  };

  const selected = new Set();
  const AUTO_COMBINE_DELAY = 900;
  let autoTimer = null;

  const cards       = document.querySelectorAll('.vehicle-card');
  const resetBtn    = document.getElementById('resetBtn');
  const placeholder = document.getElementById('placeholder');
  const stage       = document.querySelector('.stage');
  const result      = document.getElementById('result');
  const resultCn    = document.getElementById('resultCn');
  const resultEn    = document.getElementById('resultEn');
  const statusHint  = document.getElementById('statusHint');

  function updateStatus() {
    const n = selected.size;
    if (n === 0) {
      statusHint.textContent = '选车上面 ↑';
      statusHint.classList.remove('pending');
    } else if (n === 1) {
      statusHint.innerHTML = '再选 1 辆';
      statusHint.classList.remove('pending');
    } else {
      statusHint.innerHTML = '<span class="dot"></span>组合中…';
      statusHint.classList.add('pending');
    }
  }

  function scheduleAutoCombine() {
    clearTimeout(autoTimer);
    if (selected.size >= 2) {
      autoTimer = setTimeout(combine, AUTO_COMBINE_DELAY);
    } else {
      result.classList.remove('show');
      result.className = 'result';
      placeholder.classList.remove('hidden');
      stage.classList.remove('running');
      resultCn.textContent = '';
      resultEn.textContent = '';
    }
  }

  function pickCard(card) {
    const v = card.dataset.vehicle;
    if (selected.has(v)) {
      selected.delete(v);
      card.classList.remove('selected');
    } else {
      selected.add(v);
      card.classList.add('selected');
    }
    updateStatus();
    scheduleAutoCombine();
  }

  function primaryOf(sel) {
    for (const v of CHASSIS_PRIORITY) if (sel.has(v)) return v;
    return 'police';
  }

  function buildName(sel) {
    const sorted = CHASSIS_PRIORITY.filter(v => sel.has(v));
    const count = sorted.length;
    const primary = primaryOf(sel);
    if (count >= 5) {
      return { cn: '终极工程怪兽车', en: 'Ultimate Builder Monster Truck' };
    }
    if (count >= 4) {
      return { cn: '超级多功能工程车', en: 'Super Multi-Tool Builder Truck' };
    }
    if (count >= 3) {
      return { cn: NAMES[primary].cn + '多功能车', en: 'Multi-Tool ' + NAMES[primary].en + ' Truck' };
    }
    const cn = sorted.map(v => NAMES[v].cn).join('+') + '车';
    const en = sorted.map(v => NAMES[v].en).join('-') + ' Truck';
    return { cn, en };
  }

  function combine() {
    if (selected.size < 2) return;

    const primary = primaryOf(selected);
    // Force reflow so animation restarts
    result.className = 'result';
    void result.offsetWidth;

    let cls = 'result show primary-' + primary;
    selected.forEach(v => { cls += ' has-' + v; });
    result.className = cls;
    placeholder.classList.add('hidden');
    stage.classList.add('running');

    const name = buildName(selected);
    resultCn.textContent = name.cn;
    resultEn.textContent = name.en;

    statusHint.textContent = '✨ 组合完成！';
    statusHint.classList.remove('pending');

    playCombineSfx();
    if (navigator.vibrate) navigator.vibrate([40, 50, 80]);
  }

  function reset() {
    clearTimeout(autoTimer);
    selected.clear();
    cards.forEach(c => c.classList.remove('selected'));
    result.className = 'result';
    placeholder.classList.remove('hidden');
    stage.classList.remove('running');
    resultCn.textContent = '';
    resultEn.textContent = '';
    updateStatus();
  }

  function bootFromUrl() {
    const params = new URLSearchParams(window.location.search);
    const combo = params.get('combo');
    if (!combo) return;
    combo.split(',').map(v => v.trim().toLowerCase()).forEach(v => {
      const card = document.querySelector(`.vehicle-card[data-vehicle="${v}"]`);
      if (!card || selected.has(v)) return;
      selected.add(v);
      card.classList.add('selected');
    });
    updateStatus();
    if (selected.size >= 2) {
      clearTimeout(autoTimer);
      setTimeout(combine, 120);
    }
  }

  // === Combine chime ===
  let audioCtx = null;
  function playCombineSfx() {
    try {
      if (!audioCtx) {
        const AC = window.AudioContext || window.webkitAudioContext;
        audioCtx = new AC();
      }
      if (audioCtx.state === 'suspended') audioCtx.resume();

      const notes = [523.25, 659.25, 783.99, 1046.50];
      const now = audioCtx.currentTime;
      const step = 0.09;

      notes.forEach((freq, i) => {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'triangle';
        osc.frequency.value = freq;
        const start = now + i * step;
        gain.gain.setValueAtTime(0, start);
        gain.gain.linearRampToValueAtTime(0.22, start + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.001, start + 0.55);
        osc.connect(gain).connect(audioCtx.destination);
        osc.start(start);
        osc.stop(start + 0.6);
      });
    } catch (e) {}
  }

  cards.forEach(card => card.addEventListener('click', () => pickCard(card)));
  resetBtn.addEventListener('click', reset);
  updateStatus();
  bootFromUrl();

  let lastTouch = 0;
  document.addEventListener('touchend', e => {
    const now = Date.now();
    if (now - lastTouch < 320) e.preventDefault();
    lastTouch = now;
  }, { passive: false });
})();
</script>
